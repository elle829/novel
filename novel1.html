<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* ===== 背景 ===== */

body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:url("./png/dayafter.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== 本 ===== */

#book{
  position:relative;
  width:min(92vw,1100px);
  height:min(80vh,700px);
  display:flex;
  box-shadow:0 40px 120px rgba(0,0,0,0.45);
}

/* 中央線（柔らかく） */

#book::before{
  content:"";
  position:absolute;
  left:50%;
  top:5%;
  bottom:5%;
  width:2px;
  background:rgba(0,0,0,0.08);
  filter:blur(1px);
  z-index:10;
}

/* ===== ページ ===== */

.page{
  width:50%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(246,244,238,0.95);
  backdrop-filter:blur(3px);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.25),
    inset 0 0 40px rgba(0,0,0,0.06);

  position:relative;
  overflow:hidden;

  transition:transform 0.5s ease, opacity 0.4s ease;
}

/* 紙の質感 */

.page::before{
  content:"";
  position:absolute;
  inset:0;
  background-image:url("https://www.transparenttextures.com/patterns/paper-fibers.png");
  opacity:0.12;
  mix-blend-mode:multiply;
  pointer-events:none;
}

/* canvas（比率維持） */

.page canvas{
  width:100%;
  height:auto;
  max-height:100%;
  object-fit:contain;
}

/* ===== めくりアニメ ===== */

.page.flip-left{
  transform:translateX(-30px) rotateY(10deg);
  opacity:0.6;
}

.page.flip-right{
  transform:translateX(30px) rotateY(-10deg);
  opacity:0.6;
}

</style>
</head>

<body>

<div id="book">
  <div class="page" id="leftPage"><canvas id="left"></canvas></div>
  <div class="page" id="rightPage"><canvas id="right"></canvas></div>
</div>

<script>

/* ===== PDF設定 ===== */

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const url = "./archive/after/novel01.pdf";

let pdfDoc;
let state = 0;

const leftCanvas = document.getElementById("left");
const rightCanvas = document.getElementById("right");

const leftPage = document.getElementById("leftPage");
const rightPage = document.getElementById("rightPage");

/* ===== ページ描画 ===== */

async function renderPage(pageNum, canvas){

  const ctx = canvas.getContext("2d");

  if(pageNum < 1 || pageNum > pdfDoc.numPages){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    return;
  }

  const page = await pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({scale:2});

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({
    canvasContext: ctx,
    viewport
  }).promise;
}

/* ===== 見開き更新 ===== */

async function renderSpread(){

  await renderPage(state+2, leftCanvas);  // 左
  await renderPage(state+1, rightCanvas); // 右
}

/* ===== 初期化 ===== */

pdfjsLib.getDocument(url).promise.then(async (pdf)=>{
  pdfDoc = pdf;
  state = 0;
  renderSpread();
});

/* ===== ページ送り ===== */

function nextPage(){

  if(state + 2 >= pdfDoc.numPages) return;

  leftPage.classList.add("flip-left");

  setTimeout(()=>{
    state += 2;
    renderSpread();
    leftPage.classList.remove("flip-left");
  },200);
}

function prevPage(){

  if(state - 2 < 0) return;

  rightPage.classList.add("flip-right");

  setTimeout(()=>{
    state -= 2;
    renderSpread();
    rightPage.classList.remove("flip-right");
  },200);
}

/* ===== 操作 ===== */

document.getElementById("book").addEventListener("click",(e)=>{

  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const width = rect.width;

  const edge = 120; // 端だけ有効

  if(x < edge){
    nextPage();   // 左 → 次
  }else if(x > width - edge){
    prevPage();   // 右 → 戻る
  }

});

/* ===== キーボード ===== */

document.addEventListener("keydown",(e)=>{
  if(e.key === "ArrowLeft") nextPage();
  if(e.key === "ArrowRight") prevPage();
});

</script>

</body>
</html>
