<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel Viewer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
  margin:0;
  height:100vh;
  background:url("./png/dayafter.png") center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 本 */

#book{
  width:min(92vw,1100px);
  height:min(80vh,700px);
  display:flex;
  box-shadow:0 40px 120px rgba(0,0,0,0.45);
}

/* ページ */

.page{
  width:50%;
  height:100%;
  background:#f8f8f6;
  position:relative;
}

.page canvas{
  width:100%;
  height:100%;
}

/* 中央線 */
#book::before{
  content:"";
  position:absolute;
  width:2px;
  height:80%;
  background:rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<div id="book">
  <div class="page"><canvas id="left"></canvas></div>
  <div class="page"><canvas id="right"></canvas></div>
</div>

<script>

pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const url = "./archive/after/novel01.pdf";

let pdfDoc;
let state = 0;

const leftCanvas = document.getElementById("left");
const rightCanvas = document.getElementById("right");

async function renderPage(pageNum, canvas){

  if(pageNum < 1 || pageNum > pdfDoc.numPages){
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);
    return;
  }

  const page = await pdfDoc.getPage(pageNum);
  const viewport = page.getViewport({scale:2});

  canvas.width = viewport.width;
  canvas.height = viewport.height;

  await page.render({
    canvasContext: canvas.getContext("2d"),
    viewport
  }).promise;
}

/* 表示更新 */

async function renderSpread(){

  await renderPage(state+2, leftCanvas);  // 左
  await renderPage(state+1, rightCanvas); // 右
}

/* 初期化 */

pdfjsLib.getDocument(url).promise.then(async (pdf)=>{
  pdfDoc = pdf;
  state = 0;
  renderSpread();
});

/* 操作 */

document.getElementById("book").addEventListener("click",(e)=>{

  const half = window.innerWidth / 2;

  if(e.clientX < half){
    // 左クリック → 進む
    state += 2;
  }else{
    // 右クリック → 戻る
    state -= 2;
  }

  state = Math.max(0, Math.min(state, pdfDoc.numPages-1));

  renderSpread();
});

</script>

</body>
</html>
