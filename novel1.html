<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel 01</title>

  }, config.scriptTimeout),

<!-- ライブラリ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

/* ===============================
背景（dayafter統一）
=============================== */

body{
margin:0;
height:100vh;
overflow:hidden;

background:url("./png/dayafter.png") center/cover no-repeat;

font-family:"fot-tsukuaoldmin-pr6n", serif;
}

/* ===============================
霧
=============================== */

.mist{
position:fixed;
inset:-40%;
pointer-events:none;
filter:blur(80px);
}

.mist1{
background:radial-gradient(circle at 30% 40%, rgba(255,255,255,0.18), transparent 60%);
animation:mist1 160s linear infinite;
}

@keyframes mist1{
0%{transform:translate(-10%,0)}
100%{transform:translate(10%,0)}
}

/* ===============================
本
=============================== */

#book{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);

width:min(92vw,1100px);
height:min(80vh,700px);

box-shadow:0 40px 120px rgba(0,0,0,0.45);
}

/* 中央線 */

#book::before{
content:"";
position:absolute;
left:50%;
top:0;
bottom:0;
width:2px;
background:rgba(0,0,0,0.2);
z-index:10;
}

/* ===============================
ページ
=============================== */

.page{
background:white;
position:relative;
overflow:hidden;
}

/* 紙の影 */

.page::after{
content:"";
position:absolute;
inset:0;
box-shadow:inset 0 0 30px rgba(0,0,0,0.2);
pointer-events:none;
}

/* canvas */

.page canvas{
width:100%;
height:100%;
object-fit:contain;
}

/* ===============================
表紙
=============================== */

.cover{
background:linear-gradient(
135deg,
rgba(255,255,255,0.95),
rgba(230,240,255,0.9)
);

display:flex;
align-items:center;
justify-content:center;

font-size:24px;
letter-spacing:0.2em;
color:#333;
}

</style>
</head>

<body>

<div class="mist mist1"></div>

<div id="book"></div>

<script>

/* PDF worker */
pdfjsLib.GlobalWorkerOptions.workerSrc =
"https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* PDFパス */
const url = "./archive/after/novel01.pdf";

/* ページめくり音 */
const flipSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

const book = document.getElementById("book");

pdfjsLib.getDocument(url).promise.then(async pdf => {

/* PDFページ */
for(let i=1;i<=pdf.numPages;i++){

const page = await pdf.getPage(i);

const div = document.createElement("div");
div.className = "page";

const canvas = document.createElement("canvas");
div.appendChild(canvas);

const viewport = page.getViewport({scale:2});

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:canvas.getContext("2d"),
viewport:viewport
}).promise;

book.appendChild(div);

}

/* 表紙（最後） */
const cover = document.createElement("div");
cover.className = "page cover";
cover.innerHTML = "NOVEL I";
book.appendChild(cover);

/* turn.js */
$("#book").turn({
width:book.clientWidth,
height:book.clientHeight,
autoCenter:true,
direction:"rtl",
display:"double",
gradients:true,
elevation:80
});

/* クリックめくり */
$("#book").on("click", function(e){

const x = e.pageX - $(this).offset().left;

if(x < $(this).width()/2){
  $(this).turn("previous");
  flipSound.currentTime = 0;
  flipSound.play();
}
     
flipSound.currentTime = 0;
flipSound.play();

});

}); 
</script>

</body>
</html>
