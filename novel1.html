<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel 01</title>

  
<!-- 懲りないね。こんなところも見てるの？　-->

  
<link rel="preconnect" href="https://use.typekit.net">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>

/* ===============================
背景（dayafterと統一）
=============================== */

body{

margin:0;
height:100vh;
overflow:hidden;

background-image:url("./png/dayafter.png");
background-size:cover;
background-position:center;

font-family:
"fot-tsukuaoldmin-pr6n",
serif;

color:white;

}

/* ===============================
霧
=============================== */

.mist{

position:fixed;
inset:-40%;
pointer-events:none;
filter:blur(80px);

}

.mist1{

background:
radial-gradient(
circle at 30% 40%,
rgba(255,255,255,0.18),
transparent 60%
);

animation:mist1 160s linear infinite;

}

@keyframes mist1{

0%{transform:translate(-10%,0)}
100%{transform:translate(10%,0)}

}

/* ===============================
本
=============================== */

#book{

position:absolute;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:min(92vw,1100px);
height:min(80vh,700px);

box-shadow:
0 40px 120px rgba(0,0,0,0.45);

}

/* ページ */

.page{

background:white;

display:flex;
align-items:center;
justify-content:center;

overflow:hidden;

}

/* canvas */

.page canvas{

width:100%;
height:100%;
object-fit:contain;

}

/* ページ影 */

.page:after{

content:"";

position:absolute;
inset:0;

box-shadow:
inset 0 0 30px rgba(0,0,0,0.2);

pointer-events:none;

}

</style>
</head>

<body>

<div class="mist mist1"></div>

<div id="book"></div>

<script>

const url = "archive/after/novel01.pdf";

pdfjsLib.getDocument(url).promise.then(pdf => {

const book = document.getElementById("book");

for(let i=1;i<=pdf.numPages;i++){

const pageDiv = document.createElement("div");
pageDiv.className = "page";

const canvas = document.createElement("canvas");

pageDiv.appendChild(canvas);
book.appendChild(pageDiv);

pdf.getPage(i).then(page => {

const viewport = page.getViewport({scale:2});

canvas.width = viewport.width;
canvas.height = viewport.height;

page.render({
canvasContext:canvas.getContext("2d"),
viewport:viewport
});

});

}

$("#book").turn({

width:book.clientWidth,
height:book.clientHeight,

autoCenter:true,

direction:"rtl", /* 右綴じ */

display:"double",

gradients:true,
elevation:50

});

});

</script>

</body>
</html>
