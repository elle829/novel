<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel 01</title>

<script>
(function(d){
  var config = { kitId:"iuw1frp", scriptTimeout:3000, async:true },
  h=d.documentElement,
  t=setTimeout(function(){
    h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";
  },3000),
  tk=d.createElement("script"),
  f=false,
  s=d.getElementsByTagName("script")[0],
  a;
  h.className+=" wf-loading";
  tk.src="https://use.typekit.net/"+config.kitId+".js";
  tk.async=true;
  tk.onload=tk.onreadystatechange=function(){
    a=this.readyState;
    if(f || (a && a!=="complete" && a!=="loaded")) return;
    f=true;
    clearTimeout(t);
    try{ Typekit.load(config); }catch(e){}
  };
  s.parentNode.insertBefore(tk,s);
})(document);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/blasten/turn.js@master/turn.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>
html, body{
  margin:0;
  height:100%;
}

body{
  overflow:hidden;
  background:url("./png/dayafter.png") center/cover no-repeat;
  font-family:"fot-tsukuaoldmin-pr6n", serif;
}

#book{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:min(92vw,1100px);
  height:min(80vh,700px);
  box-shadow:0 40px 120px rgba(0,0,0,0.45);
}

#book::before{
  content:"";
  position:absolute;
  left:50%;
  top:0;
  bottom:0;
  width:2px;
  background:rgba(0,0,0,0.14);
  z-index:20;
  pointer-events:none;
}

.page{
  position:relative;
  width:100%;
  height:100%;
  background:#f8f8f6;
  overflow:hidden;
}

.page::after{
  content:"";
  position:absolute;
  inset:0;
  box-shadow:inset 0 0 30px rgba(0,0,0,0.14);
  pointer-events:none;
}

.page canvas{
  display:block;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="book"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const url = "./archive/after/novel01.pdf";
const bookEl = document.getElementById("book");
const flipSound = new Audio("https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3");

pdfjsLib.getDocument(url).promise.then(async (pdf) => {
  const pageDivs = [];

  for(let i = 1; i <= pdf.numPages; i++){
    const pdfPage = await pdf.getPage(i);

    const viewport = pdfPage.getViewport({ scale: 2 });

    const pageDiv = document.createElement("div");
    pageDiv.className = "page";

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    pageDiv.appendChild(canvas);
    bookEl.appendChild(pageDiv);
    pageDivs.push(pageDiv);

    await pdfPage.render({
      canvasContext: ctx,
      viewport
    }).promise;
  }

  requestAnimationFrame(() => {
    $("#book").turn({
      width: $("#book").width(),
      height: $("#book").height(),
      autoCenter: true,
      display: "double",
      direction: "rtl",
      gradients: true,
      elevation: 80,
      page: Math.min(2, pdf.numPages)
    });
  });

  $("#book").on("click", function(e){
    const x = e.pageX - $(this).offset().left;
    const half = $(this).width() / 2;

    if(x < half){
      // 左ページを右にめくる
      $(this).turn("previous");
    }else{
      // 右ページ側クリックで戻る
      $(this).turn("next");
    }

    flipSound.currentTime = 0;
    flipSound.play().catch(() => {});
  });
});
</script>

</body>
</html>
