<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* =========================
背景
========================= */

html,body{

margin:0;
height:100%;
overflow:hidden;
background:
radial-gradient(
circle at 50% 78%,
rgba(255,210,160,0.35),
rgba(255,190,150,0.18) 18%,
rgba(10,14,40,0) 40%
),
linear-gradient(
to top,
#1a1e3f,
#1b2a63 30%,
#13214f 55%,
#0a1638 80%,
#040817
);
font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
serif;
color:white;
}

/* =========================
星
========================= */

#stars{

position:fixed;
inset:0;
z-index:1;

}

/* =========================
HUDフレーム
========================= */

.hud-frame{
position:fixed;
inset:0;
background-image:url("./png/hud_frame3.svg");
background-repeat:no-repeat;
background-position:center;
background-size:contain;
pointer-events:none;
z-index:2;
opacity:.45;
filter:
drop-shadow(0 0 12px rgba(120,180,255,.6))
drop-shadow(0 0 30px rgba(120,180,255,.35))
drop-shadow(0 0 80px rgba(120,180,255,.2));
}

/* =========================
中央ウィンドウ
========================= */

.reader{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:1200px;
max-width:90vw;
padding:40px;
background:
linear-gradient(
180deg,
rgba(20,25,60,.9),
rgba(10,15,40,.95)
);
border:1px solid rgba(120,190,255,.6);
box-shadow:
0 0 20px rgba(120,190,255,.5),
0 0 80px rgba(120,190,255,.25);
z-index:10;
}

/* =========================
画像
========================= */

.page{
width:100%;
height:auto;
display:block;
box-shadow:
0 0 30px rgba(120,190,255,.4);
transform-origin:left center;
}

/* =========================
ページめくり
========================= */

.flip{
animation:flip .8s cubic-bezier(.2,.8,.3,1);
}

@keyframes flip{
0%{
transform:rotateY(0deg);
opacity:1;
}
50%{
transform:rotateY(-90deg);
opacity:.3;
}
100%{
transform:rotateY(0deg);
opacity:1;
}
}

/* =========================
操作
========================= */

.controls{
margin-top:18px;
display:flex;
justify-content:space-between;
align-items:center;
}
button{
padding:10px 22px;
background:#1b2a63;
border:1px solid rgba(120,190,255,.6);
color:white;
cursor:pointer;
font-size:14px;
}

/* SAVE */
#saveButton{
margin-top:14px;
opacity:.3;
pointer-events:none;
}
#saveButton.active{
opacity:1;
pointer-events:auto;
}

/* =========================
HUD保存演出
========================= */

.save-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.save-panel{
padding:40px;
border:1px solid rgba(120,190,255,.6);
background:
linear-gradient(
180deg,
rgba(20,25,60,.95),
rgba(10,15,40,.95)
);
box-shadow:
0 0 30px rgba(120,190,255,.6);
text-align:center;
}

.save-text{
font-size:18px;
letter-spacing:.2em;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

</style>
</head>

  
<body>

<canvas id="stars"></canvas>

<div class="hud-frame"></div>

<div class="reader">

<img id="pageImage" class="page">

<div class="controls">

<button id="prev">◀ prev</button>

<div id="pageCounter"></div>

<button id="next">next ▶</button>

</div>

<div style="text-align:center">

<button id="saveButton">SAVE</button>

</div>

</div>

<div class="save-overlay" id="saveOverlay">

<div class="save-panel">

<div class="save-text">

ARCHIVE SAVING...

</div>

</div>

</div>

<script>

/* =========================
設定
========================= */

const STORY_ID="06";   // ←話数管理
const TOTAL_PAGES=3;   // ←フォルダ内画像枚数
let page=1;

/* =========================
DOM
========================= */

const img=document.getElementById("pageImage");
const counter=document.getElementById("pageCounter");

const prev=document.getElementById("prev");
const next=document.getElementById("next");
const saveButton=document.getElementById("saveButton");

const saveOverlay=document.getElementById("saveOverlay");

/* =========================
ページ更新
========================= */

function updatePage(){

img.classList.add("flip");
setTimeout(()=>{
img.src=`archive/story${STORY_ID}/page${String(page).padStart(2,"0")}.png`;
counter.textContent=page+" / "+TOTAL_PAGES;
img.classList.remove("flip");
},300);
if(page===TOTAL_PAGES){
saveButton.classList.add("active");
}
}

/* =========================
操作
========================= */

prev.onclick=()=>{
if(page>1){
page--;
updatePage();
}
};
next.onclick=()=>{
if(page<TOTAL_PAGES){
page++;
updatePage();
}
};

/* =========================
SAVE
========================= */

saveButton.onclick=()=>{
if(page!==TOTAL_PAGES)return;
saveOverlay.style.display="flex";
setTimeout(()=>{
const key="moonStories";
let visited=JSON.parse(
localStorage.getItem(key)||"[]"
);
if(!visited.includes(STORY_ID)){
visited.push(STORY_ID);
localStorage.setItem(
key,
JSON.stringify(visited)
);
}
location.href="index.html";
},2000);
};

/* =========================
星
========================= */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const stars=[];
for(let i=0;i<220;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
for(const s of stars){
ctx.globalAlpha=Math.random();
ctx.fillRect(s.x,s.y,s.s,s.s);
}

requestAnimationFrame(drawStars);
}

drawStars();

updatePage();

</script>

</body>
</html>
