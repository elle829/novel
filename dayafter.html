<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day After</title>

<script>
(function(d){
var config={
kitId:"iuw1frp",
scriptTimeout:3000,
async:true
},
h=d.documentElement,
t=setTimeout(function(){
h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";
},config.scriptTimeout),
tk=d.createElement("script"),
f=false,
s=d.getElementsByTagName("script")[0],
a;

h.className+=" wf-loading";
tk.src="https://use.typekit.net/"+config.kitId+".js";
tk.async=true;

tk.onload=tk.onreadystatechange=function(){
a=this.readyState;
if(f||a&&a!="complete"&&a!="loaded")return;
f=true;
clearTimeout(t);
try{Typekit.load(config)}catch(e){}
};

s.parentNode.insertBefore(tk,s);

})(document);
</script>
  
<style>

/* ===============================
基本設定
=============================== */

html,body{
margin:0;
height:100%;

font-family:
"fot-tsukuaoldmin-pr6n",
"eurostile",
serif;

color:white;
}

rt{
font-family:
"fot-tsukuaoldmin-pr6n",
serif;
}

/* ===============================
背景
=============================== */

body{

background-image:url("./png/dayafter.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

}

/* 少し霧を重ねる */

body::before{

content:"";
position:fixed;
inset:0;

background:
linear-gradient(
to right,
rgba(0,0,0,0.45),
rgba(0,0,0,0.20) 35%,
rgba(0,0,0,0) 60%
);

pointer-events:none;

}

/* ===============================
タイトル
=============================== */

.title{

position:absolute;
top:70px;
left:80px;

max-width:520px;
text-shadow:
0 2px 6px rgba(0,0,0,0.35);
}

.title h1{

font-size:36px;
font-weight:400;
line-height:1.5;
margin:0;

letter-spacing:0.08em;

}

.title ruby{

ruby-position:over;

}

.title rt{

font-size:11px;
letter-spacing:0.1em;

}

.subtitle{

margin-top:14px;

font-size:16px;

opacity:0.85;

}

/* ===============================
小説リンク
=============================== */

.links{

position:absolute;

right:90px;
top:50%;

transform:translateY(-50%);

width:320px;

display:flex;
flex-direction:column;

gap:24px;

}

/* ウィンドウ */

.link-window{

padding:20px;

background:rgba(255,255,255,0.14);

border:1px solid rgba(255,255,255,0.45);

backdrop-filter:blur(8px);

transition:all 0.3s;

cursor:pointer;

}

/* ホバー */

.link-window:hover{

background:rgba(255,255,255,0.22);

transform:translateY(-2px);

}

/* タイトル */

.link-title{

font-size:18px;

margin-bottom:8px;

}

/* 説明 */

.link-desc{

font-size:13px;

opacity:0.75;

line-height:1.6;

}

/* ===============================
モバイル
=============================== */

@media (max-width:900px){

.title{

left:30px;
top:40px;

max-width:80%;

}

.title h1{

font-size:26px;

}

.links{

right:30px;
width:260px;

}

}

/* ===============================
霧
=============================== */

.mist{

position:fixed;
inset:-20%;
pointer-events:none;

filter:blur(60px);

}

/* 霧1 */

.mist1{

background:

radial-gradient(
circle at 20% 40%,
rgba(255,255,255,0.22),
transparent 50%
),

radial-gradient(
circle at 70% 60%,
rgba(255,255,255,0.18),
transparent 55%
);

animation:mistFlow1 160s linear infinite;

}

/* 霧2 */

.mist2{

background:

radial-gradient(
circle at 60% 30%,
rgba(255,255,255,0.18),
transparent 50%
),

radial-gradient(
circle at 30% 70%,
rgba(255,255,255,0.16),
transparent 60%
);

animation:mistFlow2 220s linear infinite;

}

/* ===============================
アニメーション
=============================== */

@keyframes mistFlow1{

0%{transform:translateX(-8%) translateY(-2%)}
100%{transform:translateX(8%) translateY(2%)}

}

@keyframes mistFlow2{

0%{transform:translateX(10%) translateY(4%)}
100%{transform:translateX(-10%) translateY(-4%)}

}

}


/* ===============================
花びらレイヤー
=============================== */

.petals{

position:fixed;
inset:0;

pointer-events:none;
overflow:hidden;

z-index:2;

}

/* ===============================
花びら
=============================== */

.petal{

position:absolute;

width:18px;
height:14px;

background:

radial-gradient(
ellipse at 40% 40%,
rgba(255,200,210,0.85),
rgba(255,170,190,0.55) 60%,
rgba(255,150,180,0.25)
);

border-radius:60% 60% 60% 60% / 70% 70% 40% 40%;

opacity:0.5;

filter:blur(0.6px);

animation:petalWind linear infinite;

}

/* ===============================
落下
=============================== */

@keyframes petalWind{

0%{

transform:
translateX(-10vw)
translateY(0)
rotate(0deg)
scale(0.8);

opacity:0;

}

10%{
opacity:0.6;
}

50%{

transform:
translateX(50vw)
translateY(-20px)
rotate(25deg)
scale(0.9);

}

100%{

transform:
translateX(110vw)
translateY(10px)
rotate(40deg)
scale(0.7);

opacity:0;

}

}

</style>
</head>

<body>

<div class="petals"></div>
  
<div class="mist mist1"></div>
<div class="mist mist2"></div>

<!-- ===============================
タイトル
=============================== -->

<div class="title">

<h1>

<ruby>
人間
<rt>あなた</rt>
</ruby>
たちについて知っているいくつかのこと

</h1>

<div class="subtitle">
夜が明けました。<br>
あなたたちのいない、夜明けです。
</div>

</div>

<!-- ===============================
小説リンク
=============================== -->

<div class="links">

<a href="novel1.html" style="text-decoration:none;color:white;">
<div class="link-window">

<div class="link-title">
小さいころは妖精がいて
</div>

<div class="link-desc">
妖精は少年と出会った。<br>
ある夜が明けるまでの、束の間に。
</div>

</div>
</a>


<a href="novel2.html" style="text-decoration:none;color:white;">
<div class="link-window">

<div class="link-title">
すべての夜が明けた日に
</div>

<div class="link-desc">
あなたたちは狡いから……<br>
悔しくて寂しくて、諦められなくなってしまったんです。
</div>

</div>
</a>


<a href="novel3.html" style="text-decoration:none;color:white;">
<div class="link-window">

<div class="link-title">
あなたたちについて知っているいくつかのこと
</div>

<div class="link-desc">
それでも世界は、こんなにもやさしい。
</div>

</div>
</a>

</div>

<script>


/* 花びらjs */
const container=document.querySelector(".petals");

for(let i=0;i<10;i++){

const petal=document.createElement("div");
petal.className="petal";

petal.style.top=Math.random()*70+"vh";

petal.style.animationDuration=25+Math.random()*25+"s";

petal.style.animationDelay=Math.random()*30+"s";

petal.style.transform=`scale(${0.6+Math.random()*0.5})`;

container.appendChild(petal);

}

</script>

</body>
</html>
