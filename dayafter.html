<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===============================
基本設定
=============================== */

html,body{
margin:0;
height:100%;
min-height:100vh;

font-family:
"fot-tsukuaoldmin-pr6n",
"eurostile",
sans-serif;

color:white;
}

rt{
font-family:
"fot-tsukuaoldmin-pr6n",sans-serif;
}

/* ===============================
背景
=============================== */

body{

background-image:url("./png/dayafter.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

min-height:100vh;
overflow:hidden;
transition:transform 1s ease-out;

}

/* 少し霧を重ねる */

body::before{

content:"";
position:fixed;
inset:0;

background:
linear-gradient(
to right,
rgba(0,0,0,0.28),
rgba(0,0,0,0.12) 35%,
rgba(0,0,0,0) 60%
);

pointer-events:none;

}

/* ===============================
タイトル
=============================== */

.title{

position:absolute;
top:8vh;
left:6vw;

max-width:520px;
text-shadow:
0 2px 6px rgba(0,0,0,0.35);
}

.title h1{

font-size:clamp(22px,3.2vw,42px);
font-weight:400;
line-height:1.5;
margin:0;
text-shadow:
0 2px 6px rgba(0,0,0,0.35),
0 0 12px rgba(255,255,255,0.18);
letter-spacing:0.14em;
white-space:nowrap;
}

.title ruby{

ruby-position:over;

}

.title rt{

font-size:11px;
letter-spacing:0.1em;

}

.title-divider{

width:clamp(120px,16vw,220px);
height:1px;

background:linear-gradient(
to right,
rgba(255,255,255,0.8),
rgba(255,255,255,0.1)
);

margin:22px 0;

}

.subtitle{

margin-top:14px;

font-size:clamp(12px,1.2vw,16px);
letter-spacing:0.08em;
opacity:0.85;

}

/* ===============================
小説リンク
=============================== */

.links{

position:absolute;

right:8vw;
top:50%;

transform:translateY(-50%);

width:40vw;
height:70vh;

max-width:480px;
display:flex;
flex-direction:column;

gap:24px;

}

/* ===============================
割れたガラスリンク
=============================== */

.link-window{

position:absolute;

width:clamp(260px,22vw,350px);
height:clamp(180px,16vw,240px);

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

text-align:center;

padding:clamp(16px,2vw,36px);

background-size:contain;
background-position:center;
background-repeat:no-repeat;

isolation:isolate;
}

.link-window::before{

content:"";

position:absolute;
inset:0;

background:inherit;

background-size:contain;
background-position:center;
background-repeat:no-repeat;

/* 発光 */

filter:
brightness(1.4)
drop-shadow(0 0 6px rgba(180,220,255,0.6))
drop-shadow(0 0 12px rgba(180,220,255,0.5))
drop-shadow(0 0 22px rgba(180,220,255,0.35));

opacity:0.55;

z-index:-1;

pointer-events:none;

}

/* ガラス種類 */

.glass1{

background-image:url("./png/glass1@350x.png");

top:-10%;
left:4vw;

transform:rotate(-6deg);

--rot:-6deg;
animation:glassFloat 7s ease-in-out infinite;
}

.glass2{

background-image:url("./png/glass2@350x.png");

top:24%;
left:-20vw;

width:clamp(280px,28vw,420px);
height:clamp(180px,18vw,280px);

transform:rotate(8deg);

--rot:8deg;
animation:glassFloat 8s ease-in-out infinite;
}

.glass2 .link-title,
.glass2 .link-desc{

transform:rotate(-8deg) translateY(22px);
margin-top:14px;

}
  
.glass3{

background-image:url("./png/glass3@350x.png");

top:65%;
left:8vw;

transform:rotate(8deg);

--rot:8deg;
animation:glassFloat 9s ease-in-out infinite;
}

.glass3 .link-title,
.glass3 .link-desc{

transform:rotate(4deg) translate(24px, 16px);
margin-top:12px;

}

/* テキスト */

.link-title{
font-size:clamp(14px,1.2vw,18px);
line-height:1.5;
letter-spacing:0.1em;
margin-bottom:10px;
text-shadow:0 0 10px rgba(255,255,255,0.4);
}

.link-desc{
font-size:clamp(10px,0.9vw,13px);
letter-spacing:0.05em;
line-height:1.6;
opacity:0.85;
}

/* ホバー */

.link-window:hover{

transform:scale(1.07) rotate(var(--rot));

filter:
brightness(1.15)
drop-shadow(0 0 18px rgba(200,230,255,0.8));

}

.link-window:hover::before{

filter:
brightness(1.6)
drop-shadow(0 0 10px rgba(200,240,255,0.9))
drop-shadow(0 0 22px rgba(200,240,255,0.8))
drop-shadow(0 0 40px rgba(200,240,255,0.5));

opacity:0.9;

}

/* ===============================
モバイル
=============================== */

@media (max-width:900px){

.title{

left:30px;
top:40px;

max-width:80%;

}

.title h1{

font-size:26px;

}

.links{

right:30px;
width:260px;

}

}

/* ===============================
霧
=============================== */

.mist{
position:fixed;
inset:-40%;
pointer-events:none;
mix-blend-mode:soft-light;
filter:blur(80px);
z-index:3;
}

.mist0{

background:

radial-gradient(
circle at 20% 40%,
rgba(255,255,255,0.22),
transparent 75%
),

radial-gradient(
circle at 70% 40%,
rgba(255,255,255,0.10),
transparent 60%
);
animation:mistFlow0 420s linear infinite;
opacity:0.35;
filter:blur(120px);
}
  
/* 霧1 */

.mist1{

background:

radial-gradient(
circle at 20% 40%,
rgba(255,255,255,0.22),
transparent 50%
),

radial-gradient(
circle at 70% 60%,
rgba(255,255,255,0.18),
transparent 55%
);

animation:mistFlow1 180s linear infinite;
opacity:0.75;
mix-blend-mode:screen;
filter:blur(80px);
}

/* 霧2 */

.mist2{

background:

radial-gradient(
circle at 60% 30%,
rgba(255,255,255,0.18),
transparent 50%
),

radial-gradient(
circle at 30% 70%,
rgba(255,255,255,0.16),
transparent 60%
);

animation:mistFlow2 90s linear infinite;
opacity:0.65;
filter:blur(40px);
}


/* ===============================
アニメーション
=============================== */

@keyframes mistFlow0{
0%{
transform:translate(-8%, -6%);
}
100%{
transform:translate(8%, 6%);
}
}

@keyframes mistFlow1{
0%{
transform:translate(10%, -4%);
}
100%{
transform:translate(-10%, 4%);
}
}

@keyframes mistFlow2{
0%{
transform:translate(-12%, 5%);
}
100%{
transform:translate(12%, -5%);
}
}


/* ===============================
花びらレイヤー
=============================== */

.petals{

position:fixed;
inset:-20vw;

pointer-events:none;
overflow:hidden;

z-index:2;

}

/* ===============================
花びら
=============================== */

.petal{

position:absolute;

width:18px;
height:14px;

background:
radial-gradient(
ellipse at 40% 40%,
rgba(255,200,210,0.85),
rgba(255,170,190,0.55) 60%,
rgba(255,150,180,0.25)
);

border-radius:60% 60% 60% 60% / 70% 70% 40% 40%;

opacity:0.6;
filter:blur(0.3px);

animation:
petalDrift var(--time) linear infinite,
petalZigzag var(--zig) ease-in-out infinite;
z-index:5;
}

.petal.front{

width:28px;
height:22px;

opacity:0.85;

filter:blur(1px);

z-index:10;

}

/* ===============================
落下
=============================== */

@keyframes petalWind{

0%{

transform:
translate(0,0)
rotate(0deg);

opacity:0;

}

10%{
opacity:0.5;
}

100%{

transform:
translate(var(--x), var(--y))
rotate(var(--rot));

opacity:0;

}

}

@keyframes petalDrift{

0%{
transform:
translateX(var(--startX))
translateY(var(--startY))
rotate(0deg)
scale(var(--scale));
opacity:0;
}

10%{
opacity:0.6;
}

100%{
transform:
translateX(var(--endX))
translateY(var(--endY))
rotate(var(--rot))
scale(var(--scale));
opacity:0;
}

}

@keyframes petalZigzag{

0%{
margin-top:0;
margin-left:0;
}

25%{
margin-top:var(--zigY1);
margin-left:var(--zigX1);
}

50%{
margin-top:var(--zigY2);
margin-left:var(--zigX2);
}

75%{
margin-top:var(--zigY3);
margin-left:var(--zigX3);
}

100%{
margin-top:0;
margin-left:0;
}

}

/* ===============================
光粒子
=============================== */

.particles{

position:fixed;
inset:0;

pointer-events:none;

z-index:4;

}

.particle{

position:absolute;

width:4px;
height:4px;

background:rgba(255,255,255,0.6);

border-radius:50%;

filter:blur(1px);

animation:particleFloat var(--t) linear infinite;

}

@keyframes particleFloat{

0%{
transform:
translate(var(--sx),var(--sy))
scale(0.6);
opacity:0;
}

10%{
opacity:0.8;
}

90%{
opacity:0.8;
}

100%{
transform:
translate(var(--ex),var(--ey))
scale(1.2);
opacity:0;
}

}


/* ===============================
墓石の光
=============================== */

.grave-glow{
position:absolute;

left:30%;
top:58%;

width:520px;
height:520px;

background:
radial-gradient(
circle,
rgba(255,255,220,0.25),
rgba(255,255,200,0.08),
transparent 70%
);

filter:blur(100px);

pointer-events:none;

animation:graveGlow 8s ease-in-out infinite;
}

@keyframes graveGlow{

0%{opacity:0.4}
50%{opacity:0.9}
100%{opacity:0.4}

}
  
</style>
</head>

<body>

<div class="grave-glow"></div>
<div class="petals"></div>
<div class="particles"></div>
  
<div class="mist mist0"></div>
<div class="mist mist1"></div>
<div class="mist mist2"></div>

<!-- ===============================
タイトル
=============================== -->

<div class="title">

<h1>
あなたたちについて知っている<br>
いくつかのこと
</h1>

<div class="title-divider"></div>

<div class="subtitle">
夜が明けました。<br>
あなたたちのいない、楽園で。
</div>

</div>

<!-- ===============================
小説リンク
=============================== -->

<div class="links">

<a href="novel1.html" style="text-decoration:none;color:white;">
<div class="link-window glass1">

<div class="link-title">
小さいころは妖精がいて
</div>

<div class="link-desc">
妖精は少年と出会った。<br>
ある夜が明けるまでの、束の間に。
</div>

</div>
</a>


<a href="novel2.html" style="text-decoration:none;color:white;">
<div class="link-window glass2">

<div class="link-title">
すべての夜が明けた日に
</div>

<div class="link-desc">
あなたたちは狡いから……<br>
悔しくて寂しくて、諦められない。
</div>

</div>
</a>


<a href="novel3.html" style="text-decoration:none;color:white;">
<div class="link-window glass3">

<div class="link-title">
あなたたちについて知っている<br>
いくつかのこと
</div>

<div class="link-desc">
それでも世界は、こんなにもやさしい。
</div>

</div>
</a>

</div>
</body>

<script>


/* 花びらjs */
const container = document.querySelector(".petals");

for(let i=0;i<48;i++){

const petal=document.createElement("div");
petal.className="petal";
if(Math.random()<0.25){
petal.classList.add("front");
}

/* 風の角度 */
const angle = (-60 + Math.random()*120) * Math.PI/180;

/* 移動距離 */
const distance = 160;

/* 出現位置（四辺ランダム） */
let startX, startY;

const side = Math.floor(Math.random()*4);

if(side===0){ // 左
  startX = -20;
  startY = Math.random()*100;
}

if(side===1){ // 右
  startX = 120;
  startY = Math.random()*100;
}

if(side===2){ // 上
  startX = Math.random()*100;
  startY = -20;
}

if(side===3){ // 下
  startX = Math.random()*100;
  startY = 120;
}

/* 終点 */
const endX = startX + Math.cos(angle)*distance;
const endY = startY + Math.sin(angle)*distance;

/* CSS変数 */
petal.style.setProperty("--startX", startX+"vw");
petal.style.setProperty("--startY", startY+"vh");
petal.style.setProperty("--endX", endX+"vw");
petal.style.setProperty("--endY", endY+"vh");

/* 回転 */
petal.style.setProperty("--rot",-60+Math.random()*120+"deg");

/* ジグザグ */
petal.style.setProperty("--zig",4+Math.random()*6+"s");

petal.style.setProperty("--zigX1",(-10+Math.random()*20)+"px");
petal.style.setProperty("--zigX2",(-10+Math.random()*20)+"px");
petal.style.setProperty("--zigX3",(-10+Math.random()*20)+"px");

petal.style.setProperty("--zigY1",(-10+Math.random()*20)+"px");
petal.style.setProperty("--zigY2",(-10+Math.random()*20)+"px");
petal.style.setProperty("--zigY3",(-10+Math.random()*20)+"px");

/* 速度 */
petal.style.setProperty("--time",20+Math.random()*30+"s");

/* サイズ */
petal.style.setProperty("--scale",0.3 + Math.random()*0.9);

/* 遅延 */
petal.style.animationDelay=Math.random()*60+"s";

container.appendChild(petal);

}

/* カメラ */
document.addEventListener("mousemove",(e)=>{

const x=(e.clientX/window.innerWidth-0.5)*10;
const y=(e.clientY/window.innerHeight-0.5)*10;

document.body.style.backgroundPosition =
`${50 + x/10}% ${50 + y/10}%`;

});


/* 光粒子 */

const particleLayer=document.querySelector(".particles");

for(let i=0;i<30;i++){

const p=document.createElement("div");
p.className="particle";

/* 出発位置 */

const sx=Math.random()*100+"vw";
const sy=Math.random()*100+"vh";

/* 終点 */

const ex=(Math.random()*100)+"vw";
const ey=(Math.random()*100)+"vh";

/* CSS変数 */

p.style.setProperty("--sx",sx);
p.style.setProperty("--sy",sy);

p.style.setProperty("--ex",ex);
p.style.setProperty("--ey",ey);

p.style.setProperty("--t",(20+Math.random()*40)+"s");

p.style.animationDelay=(Math.random()*40)+"s";

particleLayer.appendChild(p);

}

</script>


  
</html>
