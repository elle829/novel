<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<!-- まだ見てるの？　しーっ、おやすみ・・・ -->

  
<!-- =========================================================
     Adobe Fonts
     ========================================================= -->

<script>

(function(d){
  var config = {
    kitId: "iuw1frp",
    scriptTimeout: 3000,
    async: true
  },
  h = d.documentElement,
  t = setTimeout(function(){
    h.className = h.className.replace(/\bwf-loading\b/g,"") + " wf-inactive";
  }, config.scriptTimeout),
  tk = d.createElement("script"),
  f = false,
  s = d.getElementsByTagName("script")[0],
  a;
  h.className += " wf-loading";
  tk.src = "https://use.typekit.net/" + config.kitId + ".js";
  tk.async = true;
  tk.onload = tk.onreadystatechange = function(){
    a = this.readyState;
    if (f || (a && a !== "complete" && a !== "loaded")) return;

    }catch(e){}
  };
  s.parentNode.insertBefore(tk, s);

<style>

/* =========================
共通UI
========================= */
  
/* 日本語 */
@font-face{
font-family:"UI-JP";
src:local("fot-tsukuaoldmin-pr6n");
unicode-range:
U+3000-30FF,
U+4E00-9FFF,
U+FF00-FFEF;
}

/* 英語・数字 */
@font-face{
font-family:"UI-EN";
src:local("eurostile");
unicode-range:
U+0000-00FF;
}

/* =========================
背景
========================= */

html,body{

margin:0;
height:100%;
overflow:hidden;

font-family:
"UI-JP",
"UI-EN",
serif;

color:white;

}

/* =========================
星
========================= */

#stars{

position:fixed;
inset:0;
z-index:1;

}

/* =========================
HUDフレーム
========================= */

.hud-frame{
position:fixed;
inset:0;
background-image:url("./png/hud_frame3.svg");
background-repeat:no-repeat;
background-position:center;
background-size:contain;
pointer-events:none;
z-index:2;
opacity:.45;
filter:
drop-shadow(0 0 12px rgba(120,180,255,.6))
drop-shadow(0 0 30px rgba(120,180,255,.35))
drop-shadow(0 0 80px rgba(120,180,255,.2));
}

/* =========================
中央ウィンドウ
========================= */

.reader{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:1200px;
max-width:90vw;
max-height:90vh;
padding:40px;
background:
linear-gradient(
180deg,
rgba(20,25,60,.9),
rgba(10,15,40,.95)
);
border:1px solid rgba(120,190,255,.6);
box-shadow:
0 0 20px rgba(120,190,255,.5),
0 0 80px rgba(120,190,255,.25);
z-index:10;
}

/* =========================
画像
========================= */

.page{
max-height:70vh;
width:auto;
max-width:100%;
display:block;
margin:auto;
box-shadow:
0 0 30px rgba(120,190,255,.4);
transform-origin:left center;
}

#pageCounter{
font-size:14px;
letter-spacing:.15em;
color:#cfe7ff;
text-shadow:
0 0 6px rgba(120,190,255,.8),
0 0 14px rgba(120,190,255,.4);
}

/* =========================
ページめくり
========================= */

.flip{
animation:flip .8s cubic-bezier(.2,.8,.3,1);
}

@keyframes flip{
0%{
transform:rotateY(0deg);
opacity:1;
}
50%{
transform:rotateY(-90deg);
opacity:.3;
}
100%{
transform:rotateY(0deg);
opacity:1;
}
}

/* =========================
操作
========================= */

.controls{
margin-top:18px;
display:flex;
justify-content:space-between;
align-items:center;
}
  
button{
width:44px;
height:44px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#eef2ff;
background:
radial-gradient(
circle at 50% 40%,
rgba(122,143,216,0.35),
rgba(20,25,60,0.85)
);
border:1px solid rgba(122,143,216,0.6);
box-shadow:
0 0 6px rgba(122,143,216,.55),
0 0 16px rgba(122,143,216,.35),
inset 0 0 12px rgba(122,143,216,.25);
cursor:pointer;
transition:
box-shadow .25s ease,
transform .15s ease;
font-family:
"UI-JP",
"UI-EN",
serif;
}
  
button:disabled{
opacity:.25;
box-shadow:none;
background:rgba(20,25,60,.5);
cursor:default;
}
  
button:not(:disabled):hover{
transform:scale(1.06);
box-shadow:
0 0 10px rgba(122,143,216,.8),
0 0 24px rgba(122,143,216,.55),
0 0 40px rgba(122,143,216,.35),
inset 0 0 14px rgba(122,143,216,.35);
}

/* SAVE */
#saveButton{
margin-top:14px;
opacity:.3;
pointer-events:none;
}
#saveButton.active{
opacity:1;
pointer-events:auto;
}

/* =========================
HUD保存演出
========================= */

.save-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.save-panel{
padding:40px;
border:1px solid rgba(120,190,255,.6);
background:
linear-gradient(
180deg,
rgba(20,25,60,.95),
rgba(10,15,40,.95)
);
box-shadow:
0 0 30px rgba(120,190,255,.6);
text-align:center;
}

.save-text{
font-size:18px;
letter-spacing:.2em;
font-family:
"UI-JP",
"UI-EN",
serif;
animation:blink 1.2s infinite;
}

@keyframes blink{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

</style>
</head>

  
<body>

<canvas id="stars"></canvas>

<div class="hud-frame"></div>

<div class="reader">

<img id="pageImage" class="page">

<div class="controls">

<button id="prev">◀</button>

<div id="pageCounter"></div>

<button id="next">▶</button>
  
</div>

<div style="text-align:center">

<button id="saveButton">SAVE</button>

</div>

</div>

<div class="save-overlay" id="saveOverlay">

<div class="save-panel">

<div class="save-text">

ARCHIVE SAVING...

</div>

</div>

</div>

<script>

/* =========================
設定
========================= */

const STORY_ID="01";   // ←話数管理
const TOTAL_PAGES=2;   // ←フォルダ内画像枚数
let page=1;

/* =========================
DOM
========================= */

const img=document.getElementById("pageImage");
const counter=document.getElementById("pageCounter");

const prev=document.getElementById("prev");
const next=document.getElementById("next");
const saveButton=document.getElementById("saveButton");

const saveOverlay=document.getElementById("saveOverlay");

/* =========================
ページ更新
========================= */

function updatePage(){
img.classList.add("flip");
const newSrc =
`archive/story${STORY_ID}/page${String(page).padStart(2,"0")}.png`;
const preload = new Image();
preload.onload = () => {
setTimeout(()=>{
img.src = newSrc;
counter.textContent = page+" / "+TOTAL_PAGES;
img.classList.remove("flip");
},300);
};
preload.src = newSrc;

/* ボタン状態 */
prev.disabled = (page === 1);
next.disabled = (page === TOTAL_PAGES);

/* SAVE */
if(page === TOTAL_PAGES){
saveButton.classList.add("active");
}else{
saveButton.classList.remove("active");
}
}

/* =========================
操作
========================= */

prev.onclick=()=>{
if(page>1){
page--;
updatePage();
}
};
next.onclick=()=>{
if(page<TOTAL_PAGES){
page++;
updatePage();
}
};

/* =========================
SAVE
========================= */

saveButton.onclick=()=>{
if(page!==TOTAL_PAGES)return;
saveOverlay.style.display="flex";
setTimeout(()=>{
const key="moonStories";
let visited=JSON.parse(
localStorage.getItem(key)||"[]"
);
if(!visited.includes(STORY_ID)){
visited.push(STORY_ID);
localStorage.setItem(
key,
JSON.stringify(visited)
);
}
location.href="index.html";
},2000);
};

/* =========================
星
========================= */

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
const stars=[];
for(let i=0;i<220;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2
});
}

function drawStars(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";
for(const s of stars){
ctx.globalAlpha=Math.random();
ctx.fillRect(s.x,s.y,s.s,s.s);
}

requestAnimationFrame(drawStars);
}

drawStars();

updatePage();

</script>

</body>
</html>
