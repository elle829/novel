<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* =========================
共通UI
========================= */
  
/* 日本語 */
@font-face{
font-family:"UI-JP";
src:local("fot-tsukuaoldmin-pr6n");
unicode-range:
U+3000-30FF,
U+4E00-9FFF,
U+FF00-FFEF;
}

/* 英語・数字 */
@font-face{
font-family:"UI-EN";
src:local("eurostile");
unicode-range:
U+0000-00FF;
}

/* =========================
背景
========================= */

html,body{

margin:0;
height:100%;
overflow:hidden;

background:
radial-gradient(
circle at 50% 78%,
rgba(255,210,160,0.35),
rgba(255,190,150,0.18) 18%,
rgba(10,14,40,0) 40%
),
linear-gradient(
to top,
#1a1e3f,
#1b2a63 30%,
#13214f 55%,
#0a1638 80%,
#040817
);

font-family:
"UI-JP",
"UI-EN",
serif;
color:white;

}

/* =========================
星
========================= */

#stars{

position:fixed;
inset:0;
z-index:1;

}

/* =========================
HUDフレーム
========================= */

.hud-frame{
position:fixed;
inset:0;
background-image:url("./png/hud_frame3.svg");
background-repeat:no-repeat;
background-position:center;
background-size:contain;
pointer-events:none;
z-index:2;
opacity:.45;
filter:drop-shadow(0 0 20px rgba(120,180,255,.45));
}

/* =========================
画像
========================= */

.page{
position:absolute;
left:50%;
top:50%;
max-width:92vw;
max-height:78vh;
width:auto;
height:auto;
object-fit:contain;
box-shadow:none;
z-index:5;
transform:translate(-50%,-55%);
}

#pageCounter{
font-size:14px;
letter-spacing:.15em;
color:#cfe7ff;
text-shadow:
0 0 6px rgba(120,190,255,.8),
0 0 14px rgba(120,190,255,.4);
}

/* =========================
SFページ転送
========================= */

/* 転送開始 */
.page.out{
animation:dataOut .35s ease forwards;
}

/* 再構築 */
.page.in{
animation:dataIn .45s ease forwards;
}
  
@keyframes dataOut{
0%{
opacity:1;
transform:translate(-50%,-55%) scale(1);
}
40%{
opacity:.6;
transform:translate(-50%,-55%) scale(.98) skewX(-4deg);
}
100%{
opacity:0;
transform:translate(calc(-50% - 40px),-55%) scale(.95);
}
}

@keyframes dataIn{
0%{
opacity:0;
transform:translate(calc(-50% + 40px),-55%) scale(.95);
}
40%{
opacity:.5;
}
100%{
opacity:1;
transform:translate(-50%,-55%) scale(1);
}
}

/* =========================
操作
========================= */

.controls{
position:absolute;
left:50%;
bottom:90px;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:28px;
z-index:6;
}

#prev{
justify-self:start;
}
#next{
justify-self:end;
}
#pageCounter{
font-size:14px;
letter-spacing:.18em;
color:#cfe7ff;
text-shadow:
0 0 6px rgba(120,190,255,.8),
0 0 14px rgba(120,190,255,.4);
}
  
button{
width:44px;
height:44px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
color:#eef2ff;
background:
radial-gradient(
circle at 50% 40%,
rgba(122,143,216,0.35),
rgba(20,25,60,0.85)
);
border:1px solid rgba(122,143,216,0.6);
box-shadow:
0 0 6px rgba(122,143,216,.55),
0 0 16px rgba(122,143,216,.35),
inset 0 0 12px rgba(122,143,216,.25);
cursor:pointer;
transition:
box-shadow .25s ease,
transform .15s ease;
font-family:
"UI-JP",
"UI-EN",
serif;
}
  
button:disabled{
opacity:.25;
box-shadow:none;
background:rgba(20,25,60,.5);
cursor:default;
}
  
button:not(:disabled):hover{
transform:scale(1.06);
box-shadow:
0 0 10px rgba(122,143,216,.8),
0 0 24px rgba(122,143,216,.55),
0 0 40px rgba(122,143,216,.35),
inset 0 0 14px rgba(122,143,216,.35);
}

/* SAVE */
#saveButton{
position:absolute;
left:50%;
bottom:40px;
transform:translateX(-50%);
padding:10px 28px;
font-size:13px;
letter-spacing:.18em;
border-radius:4px;
background:
linear-gradient(
180deg,
rgba(120,190,255,.35),
rgba(20,25,60,.9)
);
border:1px solid rgba(120,190,255,.7);
box-shadow:
0 0 10px rgba(120,190,255,.5),
0 0 30px rgba(120,190,255,.25);
z-index:6;
}
#saveButton.active{
opacity:1;
pointer-events:auto;
}

/* =========================
HUD保存演出
========================= */

.save-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:100;
}

.save-panel{
position:relative;
padding:40px 60px;
border:1px solid rgba(120,190,255,.8);
background:
linear-gradient(
180deg,
rgba(20,30,70,.95),
rgba(8,12,30,.98)
);
box-shadow:
0 0 12px rgba(120,190,255,.7),
0 0 40px rgba(120,190,255,.4),
inset 0 0 20px rgba(120,190,255,.15);
text-align:center;
overflow:hidden;
}

.save-overlay .save-panel::after{
content:"";
position:absolute;
left:0;
right:0;
top:-40px;
height:40px;
background:
linear-gradient(
to bottom,
transparent,
rgba(120,190,255,.5),
transparent
);
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{
top:-40px;
}
100%{
top:100%;
}
}

.save-text{
font-size:18px;
letter-spacing:.25em;
color:#d8eeff;
text-shadow:
0 0 6px rgba(120,190,255,.9),
0 0 18px rgba(120,190,255,.6),
0 0 40px rgba(120,190,255,.4);
font-family:
"UI-JP",
"UI-EN",
serif;
animation:blink 1.2s infinite;
}

.save-bar{
margin-top:20px;
width:260px;
height:6px;
border:1px solid rgba(120,190,255,.6);
box-shadow:
0 0 10px rgba(120,190,255,.5);
}

.save-bar-fill{
height:100%;
width:0%;
background:
linear-gradient(
90deg,
rgba(120,190,255,.3),
rgba(120,190,255,1)
);
animation:saveProgress 2s linear forwards;
}

@keyframes saveProgress{
0%{width:0%;}
100%{width:100%;}
}

@keyframes blink{
0%{opacity:.4}
50%{opacity:1}
100%{opacity:.4}
}

</style>
</head>

  
<body>

<canvas id="stars"></canvas>

<div class="hud-frame"></div>

<img id="pageImage" class="page">

<div class="controls">
  <button id="prev">◀</button>
  <div id="pageCounter"></div>
  <button id="next">▶</button>
</div>

<button id="saveButton">SAVE</button>


<div class="save-overlay" id="saveOverlay">

<div class="save-panel">

<div class="save-text">
ARCHIVE SAVING...
</div>

<div class="save-bar">
<div class="save-bar-fill"></div>
</div>

</div>

</div>

<script>

/* =========================
設定
========================= */

const STORY_ID="01";   // ←話数管理
const TOTAL_PAGES=2;   // ←フォルダ内画像枚数
let page=1;

/* =========================
DOM
========================= */

const img=document.getElementById("pageImage");
const counter=document.getElementById("pageCounter");

const prev=document.getElementById("prev");
const next=document.getElementById("next");
const saveButton=document.getElementById("saveButton");

const saveOverlay=document.getElementById("saveOverlay");

/* =========================
ページ更新
========================= */

function updatePage(){
img.classList.remove("in");
img.classList.add("out");
const newSrc =
`archive/story${STORY_ID}/page${String(page).padStart(2,"0")}.png`;
img.onload = () => {
img.classList.remove("out");
img.classList.add("in");
};
img.src = newSrc;
counter.textContent = page+" / "+TOTAL_PAGES;

/* ボタン状態 */
prev.disabled = (page === 1);
next.disabled = (page === TOTAL_PAGES);

/* SAVE */
if(page === TOTAL_PAGES){
saveButton.classList.add("active");
}else{
saveButton.classList.remove("active");
}
preloadNext();

}

function preloadNext(){
if(page < TOTAL_PAGES){
const nextImg = new Image();
nextImg.src =
`archive/story${STORY_ID}/page${String(page+1).padStart(2,"0")}.png`;
}

}
  
  
/* =========================
操作
========================= */

prev.onclick=()=>{
if(page>1){
page--;
updatePage();
preloadNext();
}
};
next.onclick=()=>{
if(page<TOTAL_PAGES){
page++;
updatePage();
}
};

/* =========================
SAVE
========================= */

saveButton.onclick=()=>{
if(page!==TOTAL_PAGES)return;
saveOverlay.style.display="flex";
setTimeout(()=>{
const key="moonStories";
let visited=JSON.parse(
localStorage.getItem(key)||"[]"
);
if(!visited.includes(STORY_ID)){
visited.push(STORY_ID);
localStorage.setItem(
key,
JSON.stringify(visited)
);
}
location.href="index.html";
},2000);
};

/* =========================
星
========================= */

const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

const stars = [];

function resizeCanvas(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}

resizeCanvas();

/* 星生成 */

function createStars(){

stars.length = 0;

for(let i=0;i<160;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
s:Math.random()*2,
a:0.4 + Math.random()*0.6,
v:0.05 + Math.random()*0.15
});
}

}

createStars();

window.addEventListener("resize",()=>{
resizeCanvas();
createStars();
});

/* 描画 */

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

for(const s of stars){

ctx.globalAlpha = s.a;

ctx.beginPath();
ctx.arc(s.x,s.y,s.s,0,Math.PI*2);
ctx.fill();

/* 星移動 */

s.y += s.v;

if(s.y > canvas.height){
s.y = 0;
s.x = Math.random()*canvas.width;
}

}

/* 30fps */

requestAnimationFrame(drawStars);
}

drawStars();
  
updatePage();

</script>

</body>
</html>
