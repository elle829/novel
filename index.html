/* =========================================================

function createMoonTexture(phase){

  const size = 256;

  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,size,size);
     
  const cx = size/2;
  const cy = size/2;
  const r = size*0.34;

  /* =========================
     月本体
  ========================= */

  const body = ctx.createRadialGradient(
    cx,cy,0,
    cx,cy,r
  );

  body.addColorStop(0,"rgba(240,250,255,1)");
  body.addColorStop(0.7,"rgba(220,235,255,0.95)");
  body.addColorStop(1,"rgba(200,220,255,0.85)");

  ctx.fillStyle = body;

  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fill();


  /* =========================
     月相くり抜き
  ========================= */

  ctx.globalCompositeOperation = "destination-out";

  const offset = (phase-0.5)*r*2;

  ctx.beginPath();
  ctx.arc(cx+offset,cy,r,0,Math.PI*2);
  ctx.fill();

  ctx.globalCompositeOperation = "source-over";


  /* =========================
     青ネオングロー
  ========================= */

  const glow = ctx.createRadialGradient(
    cx,cy,r*0.9,
    cx,cy,r*2.2
  );

  glow.addColorStop(0,"rgba(200,230,255,0.35)");
  glow.addColorStop(0.5,"rgba(140,180,255,0.25)");
  glow.addColorStop(1,"rgba(100,140,255,0)");

  ctx.fillStyle = glow;

  ctx.beginPath();
  ctx.arc(cx,cy,r*2.2,0,Math.PI*2);
  ctx.fill();


  return new THREE.CanvasTexture(canvas);
}

/* =========================================================
   6) 月グループ
   ========================================================= */

const moonGroup=new THREE.Group();

moonGroup.rotation.x=-2.1;
moonGroup.rotation.z=0.35;

scene.add(moonGroup);

const moons=[];

const radiusX=4.5;
const radiusY=1.9;

for(let i=0;i<10;i++){

  const tex=createMoonTexture(i/9);

  const mat=new THREE.SpriteMaterial({
    map:tex,
    transparent:true,
    depthWrite:false
  });

  const moon=new THREE.Sprite(mat);

  moon.userData={
    angle:i/10*Math.PI*2,
    title:moonData[i].title,
    subtitle:moonData[i].subtitle,
    url:moonData[i].url
  };

  moonGroup.add(moon);

  moons.push(moon);

}



/* =========================================================
   7) 星
   ========================================================= */

function createStars(size,count){

  const geo=new THREE.BufferGeometry();

  const pos=new Float32Array(count*3);

  for(let i=0;i<count;i++){

    pos[i*3]=(Math.random()-0.5)*size;
    pos[i*3+1]=(Math.random()-0.5)*size;
    pos[i*3+2]=(Math.random()-0.5)*size;

  }

  geo.setAttribute(
    "position",
    new THREE.BufferAttribute(pos,3)
  );

  return new THREE.Points(
    geo,
    new THREE.PointsMaterial({
      color:0xffffff,
      size:0.05
    })
  );

}

const starsNear=createStars(40,400);
const starsFar=createStars(60,400);

scene.add(starsNear);
scene.add(starsFar);

const mouse=new THREE.Vector2();

  mouse.x=(e.clientX/window.innerWidth)*2-1;

/* =========================================================
   12) popup位置
   ========================================================= */

function updatePopupForHoveredMoon(moon){

  const worldPos = new THREE.Vector3();
  moon.getWorldPosition(worldPos);

  const v = worldPos.clone().project(camera);

  const screenX = (v.x * 0.5 + 0.5) * window.innerWidth;
  const screenY = (-v.y * 0.5 + 0.5) * window.innerHeight;

  /* =========================================================
     popup を月軌道の外側に出す
     ========================================================= */

  /* 軌道の中心（見た目上の中心） */
  const orbitCenterX = window.innerWidth * 0.5;
  const orbitCenterY = window.innerHeight * 0.5;

  /* 軌道中心 → 月 の方向ベクトル */
  let outwardX = screenX - orbitCenterX;
  let outwardY = screenY - orbitCenterY;

  /* ゼロ割り防止 */
  const outwardLen = Math.sqrt(outwardX * outwardX + outwardY * outwardY) || 0.0001;

  /* 正規化（長さ1にする） */
  outwardX /= outwardLen;
  outwardY /= outwardLen;

  /* 月から popup をどれだけ離すか */
  const popupDistance = 260;
  let flip = false;

  if (screenX > window.innerWidth * 0.5) {
    flip = true;
  }

  /* =========================================================
   popup最適位置探索
        ========================================================= */
     
     let popupX = screenX + outwardX * popupDistance;
     let popupY = screenY + outwardY * popupDistance;
     
     /* popupサイズ取得 */
     moonPopup.style.left = popupX + "px";
     moonPopup.style.top = popupY + "px";
     moonPopup.offsetWidth;
     
     const rectTemp = moonPopup.getBoundingClientRect();
     const popupHalfW = rectTemp.width * 0.5;
     const popupHalfH = rectTemp.height * 0.5;
     
     /* 妖精座標 */
     
     const fairyWorld = new THREE.Vector3();
     fairy.getWorldPosition(fairyWorld);
     
     const fairyScreen = fairyWorld.clone().project(camera);
     
     const fairyX = (fairyScreen.x * 0.5 + 0.5) * window.innerWidth;
     const fairyY = (-fairyScreen.y * 0.5 + 0.5) * window.innerHeight;
     
     const fairyRadius = 240;
     
     /* 探索 */
     
     let bestX = popupX;
     let bestY = popupY;
     
     for(let i=0;i<32;i++){
     
       const angle = i / 16 * Math.PI * 2;
     
       const testX = screenX + Math.cos(angle) * popupDistance;
       const testY = screenY + Math.sin(angle) * popupDistance;
     
       const insideScreen =
         testX - popupHalfW > 0 &&
         testX + popupHalfW < window.innerWidth &&
         testY - popupHalfH > 0 &&
         testY + popupHalfH < window.innerHeight;
     
       const dx = testX - fairyX;
       const dy = testY - fairyY;
     
       const dist = Math.sqrt(dx*dx + dy*dy);
     
       const safeFairy = dist > fairyRadius;
     
       if(insideScreen && safeFairy){
     
         bestX = testX;
         bestY = testY;
         break;
     
       }
     
     }
     
     popupX = bestX;
     popupY = bestY;

     
  moonPopup.style.left = popupX + "px";
  moonPopup.style.top = popupY + "px";

  /* popupサイズ取得 */
  moonPopup.offsetWidth;

  let rect = moonPopup.getBoundingClientRect();

  const halfW = rect.width * 0.5;
  const halfH = rect.height * 0.5;

  /* 画面クランプ */

  popupX = Math.max(halfW + 20, Math.min(window.innerWidth - halfW - 20, popupX));
  popupY = Math.max(halfH + 20, Math.min(window.innerHeight - halfH - 20, popupY));

  moonPopup.style.left = popupX + "px";
  moonPopup.style.top = popupY + "px";

  /* rect 更新（これが重要） */
  rect = moonPopup.getBoundingClientRect();
  

  /* popupの最近接点 */

  const closestX = Math.max(rect.left, Math.min(screenX, rect.right));
  const closestY = Math.max(rect.top, Math.min(screenY, rect.bottom));


  /* 月方向 */

  let dx = closestX - screenX;
  let dy = closestY - screenY;

  const len = Math.sqrt(dx*dx + dy*dy) || 0.0001;

  const dirX = dx / len;
  const dirY = dy / len;


  /* 月半径 */

  const moonRadius = moon.scale.x * 26;


  /* 線始点 */

  const startX = screenX + dirX * moonRadius;
  const startY = screenY + dirY * moonRadius;


  /* popupに重ならない */

  const offset = 10;

  const endX = closestX - dirX * offset;
  const endY = closestY - dirY * offset;


  /* 距離 */

  const dist = Math.sqrt(
    (endX - startX) * (endX - startX) +
    (endY - startY) * (endY - startY)
  );


  /* 角度 */

  const angle = Math.atan2(
    endY - startY,
    endX - startX
  ) * 180 / Math.PI;

  const consoleBox = moonPopup.querySelector(".console");
  if(flip){
    consoleBox.classList.add("flip");
  }else{
    consoleBox.classList.remove("flip");
  }

  /* 描画 */

  tail.style.opacity = 1;
  tail.style.left = startX + "px";
  tail.style.top = startY + "px";
  tail.style.width = dist + "px";
  tail.style.transform = "rotate(" + angle + "deg)";

  const safeDistance = 120;
  if(dist < safeDistance){
    tail.style.opacity = 0;
    return;
  }

}


/* =========================================================
   13) アニメーション
   ========================================================= */

function animate(){

  requestAnimationFrame(animate);

  orbitScroll+=(orbitTarget-orbitScroll)*0.08;

  camera.position.x+=(mouseX*0.6-camera.position.x)*0.05;

  camera.lookAt(0,0,0);

  raycaster.setFromCamera(mouse,camera);

  const hit=raycaster.intersectObjects(moons);

  hovered=hit.length>0 ? hit[0].object : null;

  if(hovered){

    document.body.style.cursor="pointer";

    moonTitle.textContent=hovered.userData.title;
    moonSubtitle.innerHTML = hovered.userData.subtitle;

    moonPopup.classList.add("show");

  }else{

    document.body.style.cursor="default";

    moonPopup.classList.remove("show");

    tail.style.opacity=0;

  }

  for(const moon of moons){

    const a=moon.userData.angle+orbitScroll;

    const x=Math.cos(a)*radiusX;
    const y=Math.sin(a)*radiusY;
    const z=Math.sin(a)*2;

    moon.position.set(x,y,z);

    const depth=(z+2)/4;
    const scale=0.6+depth*0.6;

    if(moon===hovered){
      moon.scale.set(scale*1.2,scale*1.2,1);
    }else{
      moon.scale.set(scale,scale,1);
    }

    moon.material.opacity=0.5+depth*0.5;

    moon.renderOrder=z>0 ? 5 : 15;

  }

  if(hovered){
    updatePopupForHoveredMoon(hovered);
  }

  fairyLight.position.x=mouseX*2;
  fairyLight.position.y=mouseY*-1;

  starsNear.rotation.y+=0.0005;
  starsFar.rotation.y+=0.0002;

  renderer.render(scene,camera);

}

animate();

  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth,window.innerHeight);

  renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
  );

});
