<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* ===============================
   基本画面
   =============================== */

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at 50% 78%, rgba(255,210,160,0.35) 0%, rgba(255,190,150,0.18) 18%, rgba(10,14,40,0) 40%),
linear-gradient(to top,#1a1e3f 0%,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817 100%);

color:#fff;

/* 筑紫系フォント */
font-family:
"Hiragino Mincho ProN",
"Yu Mincho",
serif;
}

#scene{
position:absolute;
inset:0;
}

/* ===============================
   UI
   =============================== */

.ui{
position:absolute;
inset:0;
pointer-events:none;
display:flex;
justify-content:space-between;
padding:30px;
z-index:5;
}

.panel{
pointer-events:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:18px;
padding:12px 16px;
max-width:340px;
max-height:200px;
}

.panel h1{
margin:0 0 6px;
font-size:24px;
}

.panel p{
margin:0;
line-height:1.5;
font-size:12px;
}

#moonTitle{
position:absolute;
left:50%;
bottom:30px;
transform:translateX(-50%);
opacity:0;
transition:0.2s;
font-size:12px;
letter-spacing:0.1em;
}

.bottom{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div id="scene"></div>

<div class="ui">

<div class="panel">
<h1>君について知っている10のこと</h1>
<p>
月をクリックすると物語ページへ移動します。
</p>
</div>

<div class="panel">
操作<br>
・スクロール：月公転<br>
・月ホバー：タイトル<br>
・クリック：ページ移動
</div>

</div>

<div id="moonTitle"></div>

<div class="bottom">
DAWN LIGHT / TEN MOONS IN ORBIT
</div>


<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";


/* ===============================
   基本Three.js
   =============================== */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0.6,9)

const renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("scene")
.appendChild(renderer.domElement)



/* ===============================
   ライト
   =============================== */

scene.add(new THREE.AmbientLight(0xaebcff,0.9))

const fairyLight = new THREE.PointLight(0xa5f4ff,1.8,20)
scene.add(fairyLight)



/* ===============================
   妖精
   =============================== */

const loader = new THREE.TextureLoader()

const fairyTexture = loader.load("./png/yousei2.png")

const fairyMaterial = new THREE.SpriteMaterial({
map:fairyTexture,
transparent:true,
depthWrite:false
})

const fairy = new THREE.Sprite(fairyMaterial)

fairy.scale.set(5,6.5,1)

fairy.renderOrder = 10

scene.add(fairy)



/* ===============================
   月テクスチャ生成
   =============================== */

function createMoonTexture(phase){

const size = 256

const canvas = document.createElement("canvas")
canvas.width=size
canvas.height=size

const ctx = canvas.getContext("2d")

const cx=size/2
const cy=size/2
const r=size*0.34

/* グラデーション */

const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.6)

g.addColorStop(0,"rgba(255,255,230,0.9)")
g.addColorStop(0.5,"rgba(255,230,180,0.35)")
g.addColorStop(1,"rgba(255,230,180,0)")

ctx.fillStyle=g
ctx.fillRect(0,0,size,size)

/* 月 */

ctx.fillStyle="#fffdf3"
ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.fill()

/* 満ち欠け */

ctx.globalCompositeOperation="destination-out"

const offset=(phase-0.5)*r*2.2

ctx.beginPath()
ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2)
ctx.fill()

return new THREE.CanvasTexture(canvas)

}



/* ===============================
   月
   =============================== */

const moonData=[
{title:"第一話",url:"story01.html"},
{title:"第二話",url:"story02.html"},
{title:"第三話",url:"story03.html"},
{title:"第四話",url:"story04.html"},
{title:"第五話",url:"story05.html"},
{title:"第六話",url:"story06.html"},
{title:"第七話",url:"story07.html"},
{title:"第八話",url:"story08.html"},
{title:"第九話",url:"story09.html"},
{title:"第十話",url:"story10.html"}
]

const moonGroup = new THREE.Group()

moonGroup.rotation.x = -2.1
moonGroup.rotation.z = 0.35

scene.add(moonGroup)

const moons=[]

const radiusX=6
const radiusY=2.5

for(let i=0;i<10;i++){

const tex=createMoonTexture(i/9)

const mat=new THREE.SpriteMaterial({
map:tex,
transparent:true,
depthWrite:false
})

const moon=new THREE.Sprite(mat)

moon.userData={
angle:i/10*Math.PI*2,
title:moonData[i].title,
url:moonData[i].url
}

moonGroup.add(moon)
moons.push(moon)

}



/* ===============================
   星
   =============================== */

function createStars(size,count){

const geo=new THREE.BufferGeometry()

const pos=new Float32Array(count*3)

for(let i=0;i<count;i++){

pos[i*3]=(Math.random()-0.5)*size
pos[i*3+1]=(Math.random()-0.5)*size
pos[i*3+2]=(Math.random()-0.5)*size

}

geo.setAttribute("position",
new THREE.BufferAttribute(pos,3))

return new THREE.Points(
geo,
new THREE.PointsMaterial({
color:0xffffff,
size:0.05
})
)

}

const starsNear=createStars(40,400)
const starsFar=createStars(60,400)

scene.add(starsNear)
scene.add(starsFar)



/* ===============================
   マウス
   =============================== */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let hovered=null

let mouseX=0
let mouseY=0

window.addEventListener("pointermove",(e)=>{

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

mouseX=mouse.x
mouseY=mouse.y

})



/* ===============================
   スクロール公転
   =============================== */

let orbitTarget=0
let orbitScroll=0

window.addEventListener("wheel",(e)=>{
orbitTarget += e.deltaY*0.0015
})



/* ===============================
   アニメーション
   =============================== */

function animate(){

requestAnimationFrame(animate)

orbitScroll += (orbitTarget-orbitScroll)*0.08


/* カメラ微動 */

camera.position.x += (mouseX*0.6 - camera.position.x)*0.05
camera.lookAt(0,0,0)


/* hover */

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObjects(moons)

hovered=null

if(hit.length>0){

hovered=hit[0].object

document.body.style.cursor="pointer"

moonTitle.textContent=hovered.userData.title
moonTitle.style.opacity=1

}else{

document.body.style.cursor="default"
moonTitle.style.opacity=0

}



/* 月位置 */

moons.forEach(moon=>{

const a=moon.userData.angle+orbitScroll

const x=Math.cos(a)*radiusX
const y=Math.sin(a)*radiusY
const z=Math.sin(a)*2

moon.position.set(x,y,z)

/* 奥行 */

const depth=(z+2)/4
const scale=0.6+depth*0.6

if(moon===hovered){
moon.scale.set(scale*1.2,scale*1.2,1)
}else{
moon.scale.set(scale,scale,1)
}

moon.material.opacity=0.5+depth*0.5

/* レイヤー */

moon.renderOrder = z>0 ? 5 : 15

})

/* 光追従 */

fairyLight.position.x = mouseX*2
fairyLight.position.y = mouseY*-1

/* 星 */

starsNear.rotation.y +=0.0005
starsFar.rotation.y +=0.0002

renderer.render(scene,camera)

}

animate()



/* ===============================
   画面リサイズ
   =============================== */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})


</script>

</body>
</html>
