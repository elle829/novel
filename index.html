<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moon Archive</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
      radial-gradient(circle at 50% 78%, rgba(255,210,160,0.35) 0%, rgba(255,190,150,0.18) 18%, rgba(10,14,40,0) 40%),
      linear-gradient(to top,
      #1a1e3f 0%,
      #1b2a63 30%,
      #13214f 55%,
      #0a1638 80%,
      #040817 100%);
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      color: #f8f5ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #scene {
      position: absolute;
      inset: 0;
    }

    .ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px;
      box-sizing: border-box;
      z-index: 5;
    }

    .panel {
      pointer-events: auto;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.28);
    }

    .title {
      max-width: 360px;
    }

    .title h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 40px);
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .title p,
    .hint p {
      margin: 0;
      line-height: 1.7;
      color: rgba(255, 245, 255, 0.82);
      font-size: 14px;
    }

    .hint {
      max-width: 300px;
      margin-left: 16px;
    }

    .tooltip {
      position: absolute;
      min-width: 150px;
      max-width: 220px;
      transform: translate(-50%, -130%);
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(10, 12, 26, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(10px);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
      color: #fff;
      z-index: 6;
    }

    .tooltip.show {
      opacity: 1;
    }

    .tooltip strong {
      display: block;
      font-size: 13px;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .tooltip span {
      display: block;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.82);
    }

    .bottom-note {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      font-size: 12px;
      letter-spacing: 0.12em;
      color: rgba(255, 255, 255, 0.68);
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
      pointer-events: none;
      z-index: 5;
    }

    /* ページめくり風の黒い幕 */
    .page-flip {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      opacity: 0;
      transform-origin: right center;
      transform: perspective(1600px) rotateY(0deg);
      background:
        linear-gradient(to left, rgba(0, 0, 0, 0.95) 0%, rgba(5, 6, 14, 0.98) 45%, rgba(8, 11, 22, 1) 100%);
      box-shadow:
        inset 50px 0 100px rgba(255, 255, 255, 0.02),
        inset -80px 0 140px rgba(0, 0, 0, 0.75);
    }

    .page-flip.active {
      animation: pageFlipForward 1s cubic-bezier(0.72, 0.02, 0.18, 1) forwards;
    }

    @keyframes pageFlipForward {
      0% {
        opacity: 0;
        transform: perspective(1600px) rotateY(88deg);
      }
      10% {
        opacity: 1;
      }
      100% {
        opacity: 1;
        transform: perspective(1600px) rotateY(0deg);
      }
    }

    @media (max-width: 768px) {
      .ui {
        flex-direction: column;
        gap: 12px;
      }

      .hint {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene"></div>

    <div class="ui">
      <div class="panel title">
        <h1>Moon Archive</h1>
        <p>
          妖精の周囲を巡る月をクリックすると、それぞれの物語ページへ移動します。<br />
          スクロールすると軌道全体が立体的に回転します。
        </p>
      </div>

      <div class="panel hint">
        <p>
          操作：<br />
          ・スクロール：軌道を立体回転<br />
          ・月にホバー：タイトル表示<br />
          ・月をクリック：ページめくり遷移<br />
          ・マウス移動：光が少し追従
        </p>
      </div>
    </div>

    <div class="tooltip" id="tooltip">
      <strong></strong>
      <span></span>
    </div>

    <div class="bottom-note">DAWN LIGHT / TEN MOONS IN ORBIT</div>
    <div class="page-flip" id="pageFlip"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';

    const container = document.getElementById('scene');
    const tooltip = document.getElementById('tooltip');
    const tooltipTitle = tooltip.querySelector('strong');
    const tooltipDesc = tooltip.querySelector('span');
    const pageFlip = document.getElementById('pageFlip');

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x050811, 12, 34);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.6, 9);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const orbitGroup = new THREE.Group();
    scene.add(orbitGroup);

    const starField = new THREE.Group();
    scene.add(starField);

    const trailGroup = new THREE.Group();
    orbitGroup.add(trailGroup);

    const ambientLight = new THREE.AmbientLight(0xaebcff, 0.72);
    scene.add(ambientLight);

    const moonLight = new THREE.PointLight(0xe8e4ff, 1.6, 22, 2);
    moonLight.position.set(0, 0.2, 1.3);
    scene.add(moonLight);

    const fairyGlow = new THREE.PointLight(0xa5f4ff, 1.6, 14, 2);
    fairyGlow.position.set(0.1, 0.4, 1.6);
    scene.add(fairyGlow);

    const dawnLight = new THREE.DirectionalLight(0xffb78f, 1.55);
    dawnLight.position.set(-4, -1, 5);
    scene.add(dawnLight);

    const coolFillLight = new THREE.DirectionalLight(0x91bfff, 1.05);
    coolFillLight.position.set(4, 2, 4);
    scene.add(coolFillLight);

    const rimLight = new THREE.PointLight(0xffd2c2, 1.65, 30, 2);
    rimLight.position.set(0, -4, 6);
    scene.add(rimLight);

    const textureLoader = new THREE.TextureLoader();

    const fairyTexture = textureLoader.load("png/yousei2.png");
    
    const fairyMaterial = new THREE.SpriteMaterial({
      map: fairyTexture,
      transparent: true,
      depthWrite:false
    });
    
    const fairy = new THREE.Sprite(fairyMaterial);
    
    fairy.scale.set(6,8,1);
    fairy.position.set(0,-0.2,2);
    
    scene.add(fairy);

    const fairyGlowTexture = (() => {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      gradient.addColorStop(0, "rgba(255,255,230,0.70)");
      gradient.addColorStop(0.25, "rgba(180,255,255,0.35)");
      gradient.addColorStop(0.55, "rgba(144,195,255,0.12)");
      gradient.addColorStop(1, "rgba(144,195,255,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      return new THREE.CanvasTexture(canvas);
    })();

    const fairyAura = new THREE.Sprite(
      new THREE.SpriteMaterial({
        map: fairyGlowTexture,
        transparent: true,
        depthWrite: false,
        opacity: 0.58
      })
    );
    fairyAura.scale.set(7.0, 7.0, 1);
    fairyAura.position.set(0, 0.1, -0.25);
    orbitGroup.add(fairyAura);

    const orbitRing = new THREE.Mesh(
      new THREE.TorusGeometry(4.65, 0.025, 16, 220),
      new THREE.MeshBasicMaterial({
        color: 0xaec7ff,
        transparent: true,
        opacity: 0.14,
      })
    );
    orbitRing.rotation.x = Math.PI / 2.18;
    orbitRing.rotation.z = 0.12;
    orbitGroup.add(orbitRing);

    const orbitRing2 = new THREE.Mesh(
      new THREE.TorusGeometry(5.15, 0.015, 12, 220),
      new THREE.MeshBasicMaterial({
        color: 0xf7d4b1,
        transparent: true,
        opacity: 0.08,
      })
    );
    orbitRing2.rotation.x = Math.PI / 2.18;
    orbitRing2.rotation.z = 0.12;
    orbitGroup.add(orbitRing2);

    const starLinkData = [
      { title: '第一話', desc: '夜のはじまり', url: 'novels/story01.html' },
      { title: '第二話', desc: '薄明の庭', url: 'novels/story02.html' },
      { title: '第三話', desc: '眠らない海', url: 'novels/story03.html' },
      { title: '第四話', desc: '玻璃の鳥', url: 'novels/story04.html' },
      { title: '第五話', desc: '風の手紙', url: 'novels/story05.html' },
      { title: '第六話', desc: '残光の塔', url: 'novels/story06.html' },
      { title: '第七話', desc: '白い回廊', url: 'novels/story07.html' },
      { title: '第八話', desc: '祈りの庭園', url: 'novels/story08.html' },
      { title: '第九話', desc: '朝焼けの手前', url: 'novels/story09.html' },
      { title: '第十話', desc: '月が明ける場所', url: 'novels/story10.html' },
    ];

    const starMeshes = [];
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function createMoonTexture(phase = 0.5, tint = "#fff7de") {
      const size = 256;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const cx = size / 2;
      const cy = size / 2;
      const r = size * 0.34;

      ctx.clearRect(0, 0, size, size);

      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.7);
      glow.addColorStop(0, "rgba(255, 248, 220, 0.75)");
      glow.addColorStop(0.45, "rgba(255, 230, 160, 0.30)");
      glow.addColorStop(1, "rgba(255, 230, 160, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, size, size);

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();

      const base = ctx.createRadialGradient(cx - r * 0.22, cy - r * 0.22, r * 0.12, cx, cy, r * 1.1);
      base.addColorStop(0, "#fffdf3");
      base.addColorStop(0.55, tint);
      base.addColorStop(1, "#e7dcc9");
      ctx.fillStyle = base;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalCompositeOperation = "destination-out";

      const offset = (phase - 0.5) * r * 2.2;
      ctx.beginPath();
      ctx.arc(cx + offset, cy, r * 0.98, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();

      ctx.globalCompositeOperation = "source-over";
      ctx.strokeStyle = "rgba(255,255,255,0.14)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.stroke();

      return new THREE.CanvasTexture(canvas);
    }

    function createTrailTexture() {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, size / 2, size, size / 2);
      gradient.addColorStop(0, "rgba(255,238,182,0)");
      gradient.addColorStop(0.2, "rgba(255,238,182,0.02)");
      gradient.addColorStop(0.55, "rgba(255,220,155,0.11)");
      gradient.addColorStop(0.82, "rgba(255,240,208,0.30)");
      gradient.addColorStop(1, "rgba(255,252,236,0.85)");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.moveTo(0, size * 0.50);
      ctx.quadraticCurveTo(size * 0.20, size * 0.42, size * 0.42, size * 0.46);
      ctx.quadraticCurveTo(size * 0.72, size * 0.49, size, size * 0.50);
      ctx.quadraticCurveTo(size * 0.72, size * 0.51, size * 0.42, size * 0.54);
      ctx.quadraticCurveTo(size * 0.20, size * 0.58, 0, size * 0.50);
      ctx.closePath();
      ctx.fill();

      const texture = new THREE.CanvasTexture(canvas);
      return texture;
    }

    const trailTexture = createTrailTexture();

    const orbitRadius = 4.65;
    const orbitTilt = Math.PI / 2.18;
    const zTilt = 0.12;

    starLinkData.forEach((item, index) => {
      const phase = index / (starLinkData.length - 1);
      const moonTexture = createMoonTexture(phase, index % 2 === 0 ? "#fff5db" : "#eef3ff");

      const material = new THREE.SpriteMaterial({
        map: moonTexture,
        transparent: true,
        depthWrite: false,
      });

      const star = new THREE.Sprite(material);
      const angle = (index / starLinkData.length) * Math.PI * 2;

      const pivot = new THREE.Group();
      const local = new THREE.Group();

      const trail = new THREE.Sprite(
        new THREE.SpriteMaterial({
          map: trailTexture,
          transparent: true,
          depthWrite: false,
          opacity: 0.35,
        })
      );

      trail.center.set(1, 0.5);
      trail.scale.set(2.4, 0.52, 1);
      trail.position.set(-0.85, 0, -0.01);
      local.add(trail);

      local.add(star);

      const size = 0.88 + (index % 3) * 0.06;
      star.scale.set(size, size, 1);

      local.position.set(
        Math.cos(angle) * orbitRadius,
        Math.sin(angle) * orbitRadius,
        0
      );
      local.rotation.z = angle;

      pivot.rotation.x = orbitTilt;
      pivot.rotation.z = zTilt;

      pivot.add(local);
      orbitGroup.add(pivot);

      star.userData = {
        ...item,
        pivot,
        local,
        trail,
        baseScale: size,
        phaseSeed: Math.random() * Math.PI * 2,
        angle,
      };

      starMeshes.push(star);
    });

    const dustCount = 780;
    const dustPositions = new Float32Array(dustCount * 3);
    for (let i = 0; i < dustCount; i++) {
      const r = 12 + Math.random() * 15;
      const a = Math.random() * Math.PI * 2;
      const y = (Math.random() - 0.5) * 12;
      dustPositions[i * 3 + 0] = Math.cos(a) * r;
      dustPositions[i * 3 + 1] = y;
      dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 14;
    }

    const dustGeometry = new THREE.BufferGeometry();
    dustGeometry.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));

    const dustMaterial = new THREE.PointsMaterial({
      color: 0xdfe9ff,
      size: 0.03,
      transparent: true,
      opacity: 0.72,
      sizeAttenuation: true,
    });

    const dust = new THREE.Points(dustGeometry, dustMaterial);
    starField.add(dust);

    let targetOrbitRotationY = 0;
    let currentOrbitRotationY = 0;

    let targetOrbitRotationX = 0.08;
    let currentOrbitRotationX = 0.08;

    let targetOrbitRotationZ = 0;
    let currentOrbitRotationZ = 0;

    let hoveredStar = null;
    let mouseX = 0;
    let mouseY = 0;
    let isNavigating = false;

    const clock = new THREE.Clock();
    
    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
    window.addEventListener('resize', resize);
    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('click', onClick);
    window.addEventListener('wheel', onWheel, { passive: true });
    
    function setTooltipFromStar(star, clientX, clientY) {
      tooltipTitle.textContent = star.userData.title;
      tooltipDesc.textContent = star.userData.desc;
      tooltip.style.left = `${clientX}px`;
      tooltip.style.top = `${clientY}px`;
      tooltip.classList.add('show');
    }

    function hideTooltip() {
      tooltip.classList.remove('show');
    }

    function navigateWithFlip(url) {
      if (!url || isNavigating) return;
      isNavigating = true;
      pageFlip.classList.add("active");
      setTimeout(() => {
        window.location.href = url;
      }, 760);
    }
    
    function onPointerMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    
      mouseX = (event.clientX / window.innerWidth) * 2 - 1;
      mouseY = (event.clientY / window.innerHeight) * 2 - 1;
    
      raycaster.setFromCamera(pointer, camera);
    
      const clickableObjects = [fairy, ...starMeshes];
      const intersects = raycaster.intersectObjects(clickableObjects, false);
    
      if (intersects.length > 0) {
        const obj = intersects[0].object;
    
        if (obj === fairy) {
          hoveredStar = null;
          document.body.style.cursor = 'pointer';
          hideTooltip();
        } else {
          hoveredStar = obj;
          document.body.style.cursor = 'pointer';
          setTooltipFromStar(hoveredStar, event.clientX, event.clientY);
        }
      } else {
        hoveredStar = null;
        document.body.style.cursor = 'default';
        hideTooltip();
      }
    }
    
    function onClick() {
      if (hoveredStar?.userData?.url) {
        navigateWithFlip(hoveredStar.userData.url);
        return;
      }
    
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObject(fairy, false);
      if (intersects.length > 0) {
        navigateWithFlip("index.html");
      }
    }

    function onWheel(event) {
      targetOrbitRotationY += event.deltaY * 0.0017;
      targetOrbitRotationX += event.deltaY * 0.00032;
      targetOrbitRotationZ += event.deltaY * 0.00022;
    
      targetOrbitRotationX = THREE.MathUtils.clamp(targetOrbitRotationX, -0.42, 0.42);
      targetOrbitRotationZ = THREE.MathUtils.clamp(targetOrbitRotationZ, -0.25, 0.25);
    }
    
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
    
      currentOrbitRotationY += (targetOrbitRotationY - currentOrbitRotationY) * 0.08;
      currentOrbitRotationX += (targetOrbitRotationX - currentOrbitRotationX) * 0.08;
      currentOrbitRotationZ += (targetOrbitRotationZ - currentOrbitRotationZ) * 0.08;
    
      orbitGroup.rotation.y = currentOrbitRotationY;
      orbitGroup.rotation.x = currentOrbitRotationX + Math.sin(t * 0.35) * 0.03;
      orbitGroup.rotation.z = currentOrbitRotationZ + Math.sin(t * 0.22) * 0.02;
    
      const fairyPulse = 1 + Math.sin(t * 2.1) * 0.035;
      fairy.scale.set(6.0 * fairyPulse, 8.0 * fairyPulse, 1);
      fairy.material.opacity = 0.97;
    
      fairyAura.scale.set(
        7.0 + Math.sin(t * 1.8) * 0.45,
        7.0 + Math.sin(t * 1.8) * 0.45,
        1
      );
      fairyAura.material.opacity = 0.45 + Math.sin(t * 1.8) * 0.08;
    
      moonLight.intensity = 1.45 + Math.sin(t * 1.7) * 0.18;
      fairyGlow.intensity = 1.45 + Math.sin(t * 2.25 + 0.4) * 0.22;
    
      dawnLight.position.x = -4 + mouseX * 1.8;
      dawnLight.position.y = -1 - mouseY * 0.9;
    
      rimLight.position.x = mouseX * 2.2;
      rimLight.position.y = -4 - mouseY * 1.2;
    
      fairyGlow.position.x = 0.15 + mouseX * 0.24;
      fairyGlow.position.y = 0.45 - mouseY * 0.18;
    
      starMeshes.forEach((star, index) => {
        const { baseScale, phaseSeed, trail } = star.userData;
        const pulse = 1 + Math.sin(t * 2.4 + phaseSeed) * 0.06;
        star.scale.set(baseScale * pulse, baseScale * pulse, 1);
    
        star.material.rotation = Math.sin(t * 0.9 + index) * 0.03;
    
        trail.scale.set(
          2.4 + Math.sin(t * 2 + phaseSeed) * 0.18,
          0.52 + Math.sin(t * 1.6 + phaseSeed) * 0.04,
          1
        );
    
        trail.material.opacity =
          0.22 + Math.abs(Math.sin(t * 2.2 + phaseSeed)) * 0.18;
    
        if (hoveredStar === star) {
          trail.material.opacity = 0.5;
          star.scale.set(baseScale * 1.13, baseScale * 1.13, 1);
        }
    
        star.parent.rotation.z = star.userData.angle + Math.sin(t * 0.25 + index) * 0.06;
      });
    
      dust.rotation.y = t * 0.01;
      dust.rotation.x = Math.sin(t * 0.08) * 0.03;
    
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
