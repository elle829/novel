<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* ===============================
画面
=============================== */

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at 50% 78%, rgba(255,210,160,0.35) 0%, rgba(255,190,150,0.18) 18%, rgba(10,14,40,0) 40%),
linear-gradient(to top,#1a1e3f 0%,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817 100%);

font-family:"Hiragino Sans","Yu Mincho",sans-serif;
color:white;
}

#scene{
position:absolute;
inset:0;
}

/* ===============================
UI
=============================== */

.ui{
position:absolute;
inset:0;
pointer-events:none;
display:flex;
justify-content:space-between;
align-items:flex-start;
padding:24px;
z-index:10;
}

.panel{
pointer-events:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(12px);
border-radius:16px;
padding:16px 20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
max-width:320px;
}

.title h1{
margin:0 0 8px;
font-size:32px;
letter-spacing:.08em;
}

.panel p{
margin:0;
line-height:1.6;
font-size:14px;
color:rgba(255,255,255,.85);
}

.help{
font-size:14px;
line-height:1.8;
}

/* 月タイトル */

#moonTitle{
position:absolute;
left:50%;
bottom:80px;
transform:translateX(-50%);
font-size:14px;
letter-spacing:.1em;
opacity:0;
transition:opacity .2s;
}

</style>
</head>

<body>

<div id="scene"></div>

<div class="ui">

<div class="panel title">
<h1>君について知っている10のこと</h1>
<p>
月をクリックすると物語ページへ移動します。
</p>
</div>

<div class="panel help">
操作<br>
・スクロール：月公転<br>
・月ホバー：タイトル<br>
・クリック：ページ移動
</div>

</div>

<div id="moonTitle"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"

/* ===============================
基本
=============================== */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0.6,9)
camera.lookAt(0,0,0)

const renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("scene").appendChild(renderer.domElement)

/* ===============================
ライト
=============================== */

const ambient = new THREE.AmbientLight(0xaebcff,0.9)
scene.add(ambient)

const fairyLight = new THREE.PointLight(0xa5f4ff,2,20)
scene.add(fairyLight)

/* ===============================
妖精
=============================== */

const loader = new THREE.TextureLoader()

const fairyTexture = loader.load("./png/yousei2.png")

const fairyMaterial = new THREE.SpriteMaterial({
map:fairyTexture,
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending
})

const fairy = new THREE.Sprite(fairyMaterial)

fairy.scale.set(5,6.5,1)
fairy.renderOrder = 10

scene.add(fairy)

/* ===============================
満ち欠け月
=============================== */

function createMoonTexture(phase){

const size=256
const canvas=document.createElement("canvas")

canvas.width=size
canvas.height=size

const ctx=canvas.getContext("2d")

const cx=size/2
const cy=size/2
const r=size*0.34

const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.6)

glow.addColorStop(0,"rgba(255,255,230,0.9)")
glow.addColorStop(.5,"rgba(255,240,200,0.3)")
glow.addColorStop(1,"rgba(255,240,200,0)")

ctx.fillStyle=glow
ctx.fillRect(0,0,size,size)

ctx.fillStyle="#fffdf3"

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.fill()

ctx.globalCompositeOperation="destination-out"

const offset=(phase-0.5)*r*2.2

ctx.beginPath()
ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2)
ctx.fill()

return new THREE.CanvasTexture(canvas)

}

/* ===============================
月
=============================== */

const moonData=[

{title:"No.1 酒場にて",url:"story01.html"},
{title:"No.2 舌戦",url:"story02.html"},
{title:"No.3 甘いもの",url:"story03.html"},
{title:"No.4 宴",url:"story04.html"},
{title:"No.5 信仰",url:"story05.html"},
{title:"No.6 似たもの",url:"story06.html"},
{title:"No.7 家",url:"story07.html"},
{title:"No.8 空想",url:"story08.html"},
{title:"No.9 使命",url:"story09.html"},
{title:"No.10 報告結果",url:"story10.html"}

]

const moonGroup=new THREE.Group()

moonGroup.rotation.x=-2.1
moonGroup.rotation.z=0.35

scene.add(moonGroup)

const moons=[]

const radiusX=6
const radiusY=2.5

for(let i=0;i<10;i++){

const texture=createMoonTexture(i/9)

const material=new THREE.SpriteMaterial({
map:texture,
transparent:true
})

const moon=new THREE.Sprite(material)

moon.userData={
angle:i/10*Math.PI*2,
title:moonData[i].title,
url:moonData[i].url
}

moonGroup.add(moon)
moons.push(moon)

}

/* ===============================
星パララックス
=============================== */

function createStars(size){

const geo=new THREE.BufferGeometry()
const count=400

const pos=new Float32Array(count*3)

for(let i=0;i<count;i++){

pos[i*3]=(Math.random()-0.5)*size
pos[i*3+1]=(Math.random()-0.5)*size
pos[i*3+2]=(Math.random()-0.5)*size

}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3))

return new THREE.Points(
geo,
new THREE.PointsMaterial({color:0xffffff,size:0.05})
)

}

const starsNear=createStars(40)
const starsFar=createStars(60)

scene.add(starsNear)
scene.add(starsFar)

/* ===============================
Raycaster
=============================== */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let hoveredMoon=null

window.addEventListener("pointermove",(e)=>{

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

})

/* ===============================
スクロール
=============================== */

let orbitTarget=0
let orbitScroll=0

let cameraTargetX=0
let cameraTargetY=0

window.addEventListener("wheel",(e)=>{

orbitTarget+=e.deltaY*0.0015
cameraTargetY+=e.deltaY*0.0003

})

/* ===============================
クリック
=============================== */

window.addEventListener("click",()=>{

if(hoveredMoon){

window.location.href=hoveredMoon.userData.url

}

})

/* ===============================
アニメーション
=============================== */

function animate(){

requestAnimationFrame(animate)

orbitScroll+=(orbitTarget-orbitScroll)*0.08

camera.position.x+=(cameraTargetX-camera.position.x)*0.05
camera.position.y+=(cameraTargetY-camera.position.y)*0.05
camera.lookAt(0,0,0)

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(moons)

hoveredMoon=null

if(intersects.length>0){

hoveredMoon=intersects[0].object

document.body.style.cursor="pointer"

moonTitle.innerText=hoveredMoon.userData.title
moonTitle.style.opacity=1

}else{

document.body.style.cursor="default"
moonTitle.style.opacity=0

}

moons.forEach(moon=>{

const a=moon.userData.angle+orbitScroll

const x=Math.cos(a)*radiusX
const y=Math.sin(a)*radiusY
const z=Math.sin(a)*2

moon.position.set(x,y,z)

const depth=(z+2)/4
const scale=0.6+depth*0.6

if(moon===hoveredMoon){

moon.scale.set(scale*1.2,scale*1.2,1)

}else{

moon.scale.set(scale,scale,1)

}

moon.material.opacity=0.5+depth*0.5

moon.renderOrder=z>0?1:20

})

fairyLight.position.x=(mouse.x)*2
fairyLight.position.y=(mouse.y)*-1

starsNear.rotation.y+=0.0005
starsFar.rotation.y+=0.0002

renderer.render(scene,camera)

}

animate()

/* ===============================
リサイズ
=============================== */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
