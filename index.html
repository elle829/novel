<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* ===============================
基本画面
=============================== */

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:
radial-gradient(circle at 50% 78%, rgba(255,210,160,0.35) 0%, rgba(255,190,150,0.18) 18%, rgba(10,14,40,0) 40%),
linear-gradient(to top,#1a1e3f 0%,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817 100%);
font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:#fff;
}

#scene{
position:absolute;
inset:0;
}

.ui{
position:absolute;
inset:0;
pointer-events:none;
display:flex;
justify-content:space-between;
padding:24px;
}

.panel{
pointer-events:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:18px;
padding:16px;
max-width:340px;
}

.bottom-note{
position:absolute;
left:50%;
bottom:18px;
transform:translateX(-50%);
font-size:12px;
opacity:.7;
}

</style>
</head>

<body>

<div id="scene"></div>

<div class="ui">

<div class="panel">
<h1>Moon Archive</h1>
<p>
妖精の周囲を巡る月をクリックすると物語へ移動します。<br>
スクロールで軌道回転。
</p>
</div>

<div class="panel">
操作<br>
・スクロール：軌道回転<br>
・月ホバー：タイトル<br>
・クリック：ページ遷移
</div>

</div>

<div class="bottom-note">DAWN LIGHT / TEN MOONS IN ORBIT</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

/* ===============================
基本セット
=============================== */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0.6,9)
camera.lookAt(0,0,0)

const renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("scene").appendChild(renderer.domElement)

/* ===============================
ライト
=============================== */

const ambient = new THREE.AmbientLight(0xaebcff,0.9)
scene.add(ambient)

const fairyLight = new THREE.PointLight(0xa5f4ff,1.8,15)
scene.add(fairyLight)

/* ===============================
妖精
=============================== */

/*
初心者メモ

Sprite
2D画像を3D空間に置く方法
*/

const loader = new THREE.TextureLoader()

const fairyTexture = loader.load("./png/yousei2.png")

const fairyMaterial = new THREE.SpriteMaterial({
map:fairyTexture,
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending
})

const fairy = new THREE.Sprite(fairyMaterial)

fairy.scale.set(5,6.5,1)

scene.add(fairy)

/* ===============================
月グループ
=============================== */

const moonGroup = new THREE.Group()

/*
軌道を奥方向に傾ける
*/

moonGroup.rotation.x = -0.9
moonGroup.rotation.z = 0.35

scene.add(moonGroup)

/* ===============================
満ち欠け月
=============================== */

function createMoonTexture(phase){

const size=256
const canvas=document.createElement("canvas")
canvas.width=size
canvas.height=size

const ctx=canvas.getContext("2d")

const cx=size/2
const cy=size/2
const r=size*0.34

ctx.fillStyle="#fffdf3"

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.fill()

ctx.globalCompositeOperation="destination-out"

const offset=(phase-0.5)*r*2.2

ctx.beginPath()
ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2)
ctx.fill()

return new THREE.CanvasTexture(canvas)

}

/* ===============================
月生成
=============================== */

const moons=[]

const radiusX=6
const radiusY=2.5

for(let i=0;i<10;i++){

const phase=i/9

const texture=createMoonTexture(phase)

const material=new THREE.SpriteMaterial({
map:texture,
transparent:true
})

const moon=new THREE.Sprite(material)

moon.scale.set(0.9,0.9,1)

moon.userData.angle=i/10*Math.PI*2

moonGroup.add(moon)

moons.push(moon)

}

/* ===============================
星背景
=============================== */

const starGeo=new THREE.BufferGeometry()

const starCount=800

const starPos=new Float32Array(starCount*3)

for(let i=0;i<starCount;i++){

starPos[i*3]=(Math.random()-0.5)*40
starPos[i*3+1]=(Math.random()-0.5)*20
starPos[i*3+2]=(Math.random()-0.5)*40

}

starGeo.setAttribute(
"position",
new THREE.BufferAttribute(starPos,3)
)

const starMat=new THREE.PointsMaterial({
color:0xffffff,
size:0.05
})

const stars=new THREE.Points(starGeo,starMat)

scene.add(stars)

/* ===============================
スクロール回転
=============================== */

let targetRot=0

window.addEventListener("wheel",(e)=>{
targetRot+=e.deltaY*0.001
})

/* ===============================
マウス光追従
=============================== */

let mouseX=0
let mouseY=0

window.addEventListener("pointermove",(e)=>{

mouseX=(e.clientX/window.innerWidth-0.5)*2
mouseY=(e.clientY/window.innerHeight-0.5)*2

})

/* ===============================
アニメーション
=============================== */

const clock=new THREE.Clock()

function animate(){

requestAnimationFrame(animate)

const t=clock.getElapsedTime()

/*
月公転
*/

moons.forEach(moon=>{

moon.userData.angle+=0.003

const a=moon.userData.angle

moon.position.set(
Math.cos(a)*radiusX,
Math.sin(a)*radiusY,
0
)

/*
奥側は小さく
*/

const depth=(moon.position.y+radiusY)/(radiusY*2)

const scale=0.6+depth*0.5

moon.scale.set(scale,scale,1)

})

/*
スクロールで軌道回転
*/

moonGroup.rotation.y+=
(targetRot-moonGroup.rotation.y)*0.08

/*
光追従
*/

fairyLight.position.x=mouseX*2
fairyLight.position.y=0.4-mouseY

/*
星回転
*/

stars.rotation.y=t*0.01

renderer.render(scene,camera)

}

animate()

/* ===============================
リサイズ
=============================== */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(
window.innerWidth,
window.innerHeight
)

})

</script>
</body>
</html>
