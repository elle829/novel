<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* =============================
   COLOR
============================= */

:root{
 --ui-accent:#7a8fd8;
 --ui-title:#eef2ff;
 --ui-subtitle:#d1d9ff;
 --ui-frame-bg-top:rgba(25,25,35,.88);
 --ui-frame-bg-bottom:rgba(18,18,25,.95);
}

/* =============================
   BACKGROUND
============================= */

html,body{
margin:0;
height:100%;
overflow:hidden;
background:
radial-gradient(circle at 50% 78%,rgba(255,210,160,.35),rgba(255,190,150,.18)18%,transparent 40%),
linear-gradient(to top,#1a1e3f,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817);
color:white;
font-family:"fot-tsukuaoldmin-pr6n","Yu Mincho",serif;
}

/* =============================
   SCENE
============================= */

#scene{
position:absolute;
inset:0;
}

/* =============================
   HEADER
============================= */

.site-header{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
font-size:28px;
letter-spacing:.12em;
color:#eef2ff;
text-shadow:0 0 8px rgba(210,220,255,.25);
z-index:10;
}

/* =============================
   HELP
============================= */

.help-button{
position:fixed;
right:28px;
bottom:28px;
width:44px;
height:44px;
border-radius:50%;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
z-index:20;
}

.help-popup{
position:fixed;
right:28px;
bottom:90px;
width:220px;
padding:14px;
background:rgba(15,18,40,.95);
border:1px solid rgba(255,255,255,.15);
border-radius:12px;
font-size:13px;
line-height:1.6;
opacity:0;
pointer-events:none;
transition:opacity .2s;
z-index:20;
}

.help-button:hover+.help-popup{
opacity:1;
}

/* =============================
   BOTTOM TEXT
============================= */

.bottom{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:.7;
}

/* =============================
   POPUP
============================= */

#moonPopup{
position:absolute;
pointer-events:none;
opacity:0;
transform:translate(-50%,-50%) scale(.95);
transition:opacity .22s,transform .22s;
z-index:20;
}

/* popup line */

.popup-tail{
position:fixed;
height:2px;
background:var(--ui-accent);
transform-origin:0 50%;
opacity:0;
z-index:25;
}

/* popup frame */

.console{
position:relative;
width:420px;
padding:50px 40px 48px;
background:linear-gradient(var(--ui-frame-bg-top),var(--ui-frame-bg-bottom));
border:2px solid var(--ui-accent);
clip-path:polygon(0 0,100% 0,100% 100%,70px 100%,0 calc(100% - 70px));
}

.popup-title{
font-size:24px;
margin-bottom:16px;
color:var(--ui-title);
}

.popup-subtitle{
font-size:14px;
color:var(--ui-subtitle);
}

/* mobile */

@media(max-width:768px){
.console{
width:min(84vw,360px);
padding:30px;
}
.popup-title{font-size:18px}
.popup-subtitle{font-size:12px}
}

</style>
</head>

<body>

<div id="scene"></div>

<header class="site-header">
君について知っている10のこと
</header>

<div class="help-button">?</div>

<div class="help-popup">
操作<br><br>
・スクロール：月公転<br>
・月ホバー：タイトル表示<br>
・クリック：ページ移動
</div>

<div class="popup-tail"></div>

<div id="moonPopup">
<div class="console">
<div class="popup-title" id="moonTitle"></div>
<div class="popup-subtitle" id="moonSubtitle"></div>
</div>
</div>

<div class="bottom">
ABOUT YOU / MIRRORING LAB.
</div>

<div class="page-flip" id="pageFlip"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

/* =============================
   THREE BASIC
============================= */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
55,window.innerWidth/window.innerHeight,.1,100
);
camera.position.set(0,.6,9);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.getElementById("scene").appendChild(renderer.domElement);

/* =============================
   LIGHT
============================= */

scene.add(new THREE.AmbientLight(0xaebcff,.9));
const fairyLight=new THREE.PointLight(0xa5f4ff,2,20);
scene.add(fairyLight);

/* =============================
   FAIRY
============================= */

const loader=new THREE.TextureLoader();
const fairyTex=loader.load("./png/yousei3.png");

const fairy=new THREE.Sprite(
new THREE.SpriteMaterial({map:fairyTex,transparent:true})
);
fairy.scale.set(4.2,5.4,1);
scene.add(fairy);

/* =============================
   MOON TEXTURE
============================= */

function createMoonTexture(p){

const s=256;
const c=document.createElement("canvas");
c.width=c.height=s;
const ctx=c.getContext("2d");

const cx=s/2,cy=s/2,r=s*.34;

const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.6);
g.addColorStop(0,"rgba(255,255,230,.9)");
g.addColorStop(.5,"rgba(255,230,180,.35)");
g.addColorStop(1,"rgba(255,230,180,0)");

ctx.fillStyle=g;
ctx.fillRect(0,0,s,s);

ctx.fillStyle="#fffdf3";
ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);
ctx.fill();

ctx.globalCompositeOperation="destination-out";
const off=(p-.5)*r*2.2;

ctx.beginPath();
ctx.arc(cx+off,cy,r*.98,0,Math.PI*2);
ctx.fill();

return new THREE.CanvasTexture(c);
}

/* =============================
   MOONS
============================= */

const moonData=[
{title:"酒場にて",subtitle:"フラッグシップ / デミアン",url:"story01.html"},
{title:"舌戦",subtitle:"秘聞の館 / ネフェル、ヤフォダ",url:"story02.html"},
{title:"甘いもの",subtitle:"工房 / アイノ、イネファ",url:"story03.html"},
{title:"宴",subtitle:"西風騎士団 / ファルカ",url:"story04.html"},
{title:"信仰",subtitle:"霜月の子 / ラウマ",url:"story05.html"},
{title:"似たもの",subtitle:"実験設計局 / サンドローネ",url:"story06.html"},
{title:"家",subtitle:"銀月の庭",url:"story07.html"},
{title:"空想",subtitle:"魔女会",url:"story08.html"},
{title:"使命",subtitle:"ライトキーパー",url:"story09.html"},
{title:"報告結果",subtitle:"君へ",url:"story10.html"}
];

const moonGroup=new THREE.Group();
moonGroup.rotation.x=-2.1;
moonGroup.rotation.z=.35;
scene.add(moonGroup);

const moons=[];
const radiusX=4.5;
const radiusY=1.9;

for(let i=0;i<10;i++){

const moon=new THREE.Sprite(
new THREE.SpriteMaterial({
map:createMoonTexture(i/9),
transparent:true
})
);

moon.userData={
angle:i/10*Math.PI*2,
...moonData[i]
};

moonGroup.add(moon);
moons.push(moon);

}

/* =============================
   STARS
============================= */

function createStars(size,count){

const g=new THREE.BufferGeometry();
const p=new Float32Array(count*3);

for(let i=0;i<count;i++){
p[i*3]=(Math.random()-.5)*size;
p[i*3+1]=(Math.random()-.5)*size;
p[i*3+2]=(Math.random()-.5)*size;
}

g.setAttribute("position",new THREE.BufferAttribute(p,3));

return new THREE.Points(
g,new THREE.PointsMaterial({size:.05})
);
}

scene.add(createStars(40,400));
scene.add(createStars(60,400));

/* =============================
   MOUSE
============================= */

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hovered=null;

window.addEventListener("pointermove",e=>{
mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;
});

/* =============================
   POPUP
============================= */

const popup=document.getElementById("moonPopup");
const title=document.getElementById("moonTitle");
const subtitle=document.getElementById("moonSubtitle");
const tail=document.querySelector(".popup-tail");

/* =============================
   ORBIT
============================= */

let orbitTarget=0;
let orbitScroll=0;

window.addEventListener("wheel",e=>{
orbitTarget+=e.deltaY*0.0015;
});

/* =============================
   POPUP POSITION
============================= */

function updatePopup(moon){

const wp=new THREE.Vector3();
moon.getWorldPosition(wp);
const v=wp.clone().project(camera);

const sx=(v.x*.5+.5)*window.innerWidth;
const sy=(-v.y*.5+.5)*window.innerHeight;

/* orbit outward */

let ox=sx-window.innerWidth*.5;
let oy=sy-window.innerHeight*.5;
const len=Math.hypot(ox,oy)||.0001;
ox/=len;
oy/=len;

/* popup position */

let px=sx+ox*260;
let py=sy+oy*260;

/* fairy avoid */

const fw=new THREE.Vector3();
fairy.getWorldPosition(fw);
const fs=fw.project(camera);

const fx=(fs.x*.5+.5)*window.innerWidth;
const fy=(-fs.y*.5+.5)*window.innerHeight;

const dist=Math.hypot(px-fx,py-fy);

if(dist<260){
px+=ox*(260-dist);
py+=oy*(260-dist);
}

/* clamp */

px=Math.max(300,Math.min(window.innerWidth-300,px));
py=Math.max(160,Math.min(window.innerHeight-160,py));

popup.style.left=px+"px";
popup.style.top=py+"px";

/* line */

const rect=popup.getBoundingClientRect();

const cx=Math.max(rect.left,Math.min(sx,rect.right));
const cy=Math.max(rect.top,Math.min(sy,rect.bottom));

const dx=cx-sx;
const dy=cy-sy;

const d=Math.hypot(dx,dy);
const dirX=dx/d;
const dirY=dy/d;

const startX=sx+dirX*moon.scale.x*26;
const startY=sy+dirY*moon.scale.x*26;

const endX=cx-dirX*10;
const endY=cy-dirY*10;

const distLine=Math.hypot(endX-startX,endY-startY);
const ang=Math.atan2(endY-startY,endX-startX)*180/Math.PI;

tail.style.opacity=1;
tail.style.left=startX+"px";
tail.style.top=startY+"px";
tail.style.width=distLine+"px";
tail.style.transform=`rotate(${ang}deg)`;

}

/* =============================
   ANIMATION
============================= */

function animate(){

requestAnimationFrame(animate);

orbitScroll+=(orbitTarget-orbitScroll)*.08;

raycaster.setFromCamera(mouse,camera);
const hit=raycaster.intersectObjects(moons);
hovered=hit.length?hit[0].object:null;

if(hovered){
title.textContent=hovered.userData.title;
subtitle.textContent=hovered.userData.subtitle;
popup.style.opacity=1;
popup.style.transform="translate(-50%,-50%) scale(1)";
updatePopup(hovered);
}else{
popup.style.opacity=0;
tail.style.opacity=0;
}

for(const m of moons){

const a=m.userData.angle+orbitScroll;

const x=Math.cos(a)*radiusX;
const y=Math.sin(a)*radiusY;
const z=Math.sin(a)*2;

m.position.set(x,y,z);

const depth=(z+2)/4;
const s=.6+depth*.6;

m.scale.set(s,s,1);
m.material.opacity=.5+depth*.5;

}

renderer.render(scene,camera);

}

animate();

/* resize */

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>
</body>
</html>
