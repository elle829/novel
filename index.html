<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>
  
<!-- Adobe Fonts -->

<style>

/* ===============================
背景
=============================== */

html,body{

margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at 50% 78%, rgba(255,210,160,0.35) 0%, rgba(255,190,150,0.18) 18%, rgba(10,14,40,0) 40%),
linear-gradient(to top,#1a1e3f 0%,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817 100%);

color:white;

font-family:
"fot-tsukuaoldmin-pr6n",
"Hiragino Mincho ProN",
"Yu Mincho",
serif;

font-weight:300;
letter-spacing:0.05em;

-webkit-font-smoothing:antialiased;
text-rendering:optimizeLegibility;

}

#scene{
position:absolute;
inset:0;
}

/* ===============================
UI
=============================== */

.ui{
position:absolute;
inset:0;
pointer-events:none;
display:flex;
justify-content:space-between;
padding:24px;
z-index:5;
}

.panel{
pointer-events:auto;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:18px;
padding:12px 16px;
max-width:320px;
}

.panel h1{
margin:0 0 6px;
font-size:30px;
}

.panel p{
margin:0;
font-size:13px;
line-height:1.5;
}

.help{
font-size:13px;
line-height:1.6;
}

#moonTitle{
position:absolute;
left:50%;
bottom:80px;
transform:translateX(-50%);
font-size:14px;
letter-spacing:.1em;
opacity:0;
transition:.2s;
text-shadow:0 2px 12px rgba(0,0,0,0.5);
}

.bottom{
position:absolute;
bottom:18px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:.7;
}

/* ===============================
ページめくり
=============================== */

.page-flip{
position:fixed;
inset:0;
background:black;
opacity:0;
pointer-events:none;
z-index:20;
}

.page-flip.active{
animation:flip 1s forwards;
}

@keyframes flip{
0%{opacity:0}
20%{opacity:1}
100%{opacity:1}
}

/* ===============================
モバイル
=============================== */

@media (max-width:768px){

.ui{
flex-direction:column;
gap:10px;
padding:14px;
}

.panel{
max-width:85%;
}

.panel h1{
font-size:22px;
}

.panel p{
font-size:12px;
}

#moonTitle{
font-size:12px;
bottom:70px;
}

.bottom{
font-size:10px;
}

}

/* ===============================
月ホバーポップアップ
コンソール風UI
=============================== */

#moonPopup{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%) scale(.95);
padding:10px 16px;
background:rgba(10,15,40,0.85);
border:1px solid rgba(255,255,255,0.15);
border-radius:12px;
backdrop-filter:blur(10px);
pointer-events:none;
opacity:0;
transition:opacity .2s, transform .2s;
box-shadow:0 8px 30px rgba(0,0,0,.6);
text-align:center;
z-index:10;
}

#moonTitle{
font-size:15px;
letter-spacing:.08em;
}

#moonSubtitle{
font-size:12px;
opacity:.7;
margin-top:2px;
}
  
</style>
</head>

<body>

<div id="scene"></div>

<div class="ui">

<div class="panel">
<h1>君について知っている10のこと</h1>
<p>
月をクリックすると物語ページへ移動します
</p>
</div>

<div class="panel help">
操作<br>
・スクロール：月公転<br>
・月ホバー：タイトル<br>
・クリック：ページ移動
</div>

</div>

<div id="moonPopup">
  <div id="moonTitle"></div>
  <div id="moonSubtitle"></div>
</div>

<div class="bottom">
ABOUT YOU / MIRRORING LAB.
</div>

<div class="page-flip" id="pageFlip"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

/* ===============================
基本
=============================== */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0.6,9)

const renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("scene")
.appendChild(renderer.domElement)

/* ===============================
ライト
=============================== */

scene.add(new THREE.AmbientLight(0xaebcff,0.9))

const fairyLight=new THREE.PointLight(0xa5f4ff,2,20)

scene.add(fairyLight)

/* ===============================
妖精
=============================== */

const loader=new THREE.TextureLoader()

const fairyTexture=loader.load("./png/yousei3.png")

const fairyMaterial=new THREE.SpriteMaterial({
map:fairyTexture,
transparent:true,
depthWrite:false
})

const fairy=new THREE.Sprite(fairyMaterial)

fairy.scale.set(5,6.5,1)

fairy.renderOrder=10

scene.add(fairy)

/* ===============================
月生成
=============================== */

function createMoonTexture(phase){

const size=256

const canvas=document.createElement("canvas")
canvas.width=size
canvas.height=size

const ctx=canvas.getContext("2d")

const cx=size/2
const cy=size/2
const r=size*0.34

const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.6)

g.addColorStop(0,"rgba(255,255,230,0.9)")
g.addColorStop(.5,"rgba(255,230,180,0.35)")
g.addColorStop(1,"rgba(255,230,180,0)")

ctx.fillStyle=g
ctx.fillRect(0,0,size,size)

ctx.fillStyle="#fffdf3"

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.fill()

ctx.globalCompositeOperation="destination-out"

const offset=(phase-0.5)*r*2.2

ctx.beginPath()
ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2)
ctx.fill()

return new THREE.CanvasTexture(canvas)

}

/* ===============================
月
=============================== */

const moonData=[
{title:"酒場にて",subtitle:"フラッグシップ/デミアン",url:"story01.html"},
{title:"舌戦",subtitle:"秘聞の館/ネフェル、ヤフォダ",url:"story02.html"},
{title:"甘いもの",subtitle:"カチャカチャクルムカケ工房/アイノ、イネファ",url:"story03.html"},
{title:"宴",subtitle:"西風騎士団/ファルカ",url:"story04.html"},
{title:"信仰",subtitle:"霜月の子/ラウマ",url:"story05.html"},
{title:"似たもの",subtitle:"実験設計局/サンドローネ",url:"story06.html"},
{title:"家",subtitle:"銀月の庭/コロンビーナ、旅人",url:"story07.html"},
{title:"空想",subtitle:"魔女会/アルベド、ドゥリン",url:"story08.html"},
{title:"使命",subtitle:"ライトキーパー/イルーガ、ニキータ",url:"story09.html"},
{title:"報告結果",subtitle:"君へ",url:"story10.html"}
]

const moonGroup=new THREE.Group()

moonGroup.rotation.x=-2.1
moonGroup.rotation.z=0.35

scene.add(moonGroup)

const moons=[]

const radiusX=6
const radiusY=2.5

for(let i=0;i<10;i++){

const tex=createMoonTexture(i/9)

const mat=new THREE.SpriteMaterial({
map:tex,
transparent:true,
depthWrite:false
})

const moon=new THREE.Sprite(mat)

moon.userData={
angle:i/10*Math.PI*2,
title:moonData[i].title,
url:moonData[i].url
}

moonGroup.add(moon)

moons.push(moon)

}

/* ===============================
星
=============================== */

function createStars(size,count){

const geo=new THREE.BufferGeometry()

const pos=new Float32Array(count*3)

for(let i=0;i<count;i++){

pos[i*3]=(Math.random()-0.5)*size
pos[i*3+1]=(Math.random()-0.5)*size
pos[i*3+2]=(Math.random()-0.5)*size

}

geo.setAttribute(
"position",
new THREE.BufferAttribute(pos,3)
)

return new THREE.Points(
geo,
new THREE.PointsMaterial({
color:0xffffff,
size:0.05
})
)

}

const starsNear=createStars(40,400)
const starsFar=createStars(60,400)

scene.add(starsNear)
scene.add(starsFar)

/* ===============================
マウス
=============================== */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let hovered=null

let mouseX=0
let mouseY=0

window.addEventListener("pointermove",(e)=>{

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

mouseX=mouse.x
mouseY=mouse.y

})

/* ===============================
ポップアップUI取得
=============================== */

const moonPopup=document.getElementById("moonPopup")
const moonTitle=document.getElementById("moonTitle")
const moonSubtitle=document.getElementById("moonSubtitle")

/* ===============================
スクロール
=============================== */

let orbitTarget=0
let orbitScroll=0

window.addEventListener("wheel",(e)=>{

orbitTarget+=e.deltaY*0.0015

})

/* ===============================
クリック
=============================== */

const pageFlip=document.getElementById("pageFlip")

window.addEventListener("click",()=>{

if(hovered){

pageFlip.classList.add("active")

setTimeout(()=>{
location.href=hovered.userData.url
},600)

}

})

/* ===============================
アニメーション
=============================== */

function animate(){

requestAnimationFrame(animate)

orbitScroll+=(orbitTarget-orbitScroll)*0.08

camera.position.x+=(mouseX*0.6-camera.position.x)*0.05

camera.lookAt(0,0,0)

raycaster.setFromCamera(mouse,camera)

const hit=raycaster.intersectObjects(moons)

hovered=null

if(hit.length>0){

hovered=hit[0].object

document.body.style.cursor="pointer"

/* タイトル表示 */

moonTitle.textContent=hovered.userData.title
moonSubtitle.textContent=hovered.userData.subtitle

moonPopup.style.opacity=1
moonPopup.style.transform="translate(-50%,-50%) scale(1)"

}else{

document.body.style.cursor="default"

moonPopup.style.opacity=0
moonPopup.style.transform="translate(-50%,-50%) scale(.95)"

}

/* 月 */

moons.forEach(moon=>{

const a=moon.userData.angle+orbitScroll

const x=Math.cos(a)*radiusX
const y=Math.sin(a)*radiusY
const z=Math.sin(a)*2

moon.position.set(x,y,z)

const depth=(z+2)/4

const scale=0.6+depth*0.6

if(moon===hovered){

moon.scale.set(scale*1.2,scale*1.2,1)

}else{

moon.scale.set(scale,scale,1)

}

moon.material.opacity=0.5+depth*0.5

moon.renderOrder=z>0?5:15

/* ===============================
ポップアップ位置追従
=============================== */

if(moon===hovered){
const v=moon.position.clone()
v.project(camera)
const x=(v.x*0.5+0.5)*window.innerWidth
const y=(-v.y*0.5+0.5)*window.innerHeight
moonPopup.style.left=x+"px"
moonPopup.style.top=(y-40)+"px"

}

})

fairyLight.position.x=mouseX*2
fairyLight.position.y=mouseY*-1

starsNear.rotation.y+=0.0005
starsFar.rotation.y+=0.0002

renderer.render(scene,camera)

}

animate()

/* ===============================
リサイズ
=============================== */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight

camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
