<style>

/* =========================================================
   0) 共通カラー
   ========================================================= */

:root{
  --ui-accent:#7a8fd8;
  --ui-accent-glow:rgba(122,143,216,.48);
  --ui-accent-soft:rgba(122,143,216,.24);

  --ui-title:#eef2ff;
  --ui-subtitle:#d1d9ff;

  --ui-frame-bg-top:rgba(25,25,35,.88);
  --ui-frame-bg-bottom:rgba(18,18,25,.95);
}


/* =========================================================
   1) 背景
   ========================================================= */

html,
body{

  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;

  background:

    radial-gradient(
      circle at 50% 78%,
      rgba(255,210,160,0.35) 0%,
      rgba(255,190,150,0.18) 18%,
      rgba(10,14,40,0) 40%
    ),

    linear-gradient(
      to top,
      #1a1e3f 0%,
      #1b2a63 30%,
      #13214f 55%,
      #0a1638 80%,
      #040817 100%
    );

  color:white;

  font-family:
    "fot-tsukuaoldmin-pr6n",
    "Hiragino Mincho ProN",
    "Yu Mincho",
    serif;

  font-weight:300;
  letter-spacing:0.05em;

  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}


#scene{
  position:absolute;
  inset:0;
}


/* =========================================================
   2) 上部UI
   ========================================================= */

.ui{

  position:absolute;
  inset:0;

  pointer-events:none;

  display:flex;
  justify-content:space-between;

  padding:24px;
  z-index:5;

}

.panel{

  pointer-events:auto;

  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);

  backdrop-filter:blur(10px);

  border-radius:18px;

  padding:12px 16px;

  max-width:320px;
}

.panel h1{

  margin:0 0 6px;
  font-size:30px;

}

.panel p{

  margin:0;
  font-size:13px;
  line-height:1.5;

}

.help{

  font-size:13px;
  line-height:1.6;

}

.bottom{

  position:absolute;
  bottom:18px;
  left:50%;

  transform:translateX(-50%);

  font-size:12px;
  opacity:.7;

  z-index:5;

}


/* =========================================================
   3) ページめくり用フェード
   ========================================================= */

.page-flip{

  position:fixed;
  inset:0;

  background:black;

  opacity:0;

  pointer-events:none;

  z-index:50;

}

.page-flip.active{

  animation:flip 1s forwards;

}

@keyframes flip{

  0%{ opacity:0; }

  20%{ opacity:1; }

  100%{ opacity:1; }

}


/* =========================================================
   4) ポップアップ本体
   ========================================================= */

#moonPopup{

  position:absolute;

  pointer-events:none;

  opacity:0;

  transform:translate(-50%,-50%) scale(.95);

  transform-origin:center center;

  transition:
    opacity .22s ease,
    transform .22s ease;

  z-index:20;

}


/* =========================================================
   5) 月から出る線
   ========================================================= */

.popup-tail{

  position:fixed;

  width:0;
  height:2px;

  background:var(--ui-accent);

  transform-origin:left center;

  pointer-events:none;

  z-index:25;

  opacity:0;

  box-shadow:
    0 0 6px rgba(122,143,216,.45),
    0 0 16px rgba(122,143,216,.22);

  transition:opacity .18s ease;

}

/* 月側ノード */

.popup-tail::before{

  content:"";

  position:absolute;

  left:-6px;
  top:-3px;

  width:8px;
  height:8px;

  border:2px solid var(--ui-accent);

  background:#050814;

  transform:rotate(45deg);

  box-shadow:0 0 6px rgba(122,143,216,.5);

}


/* =========================================================
   6) フレーム
   ========================================================= */

.console{

  position:relative;

  width:420px;

  padding:50px 40px 48px;

  background:linear-gradient(
    180deg,
    var(--ui-frame-bg-top),
    var(--ui-frame-bg-bottom)
  );

  border:2px solid var(--ui-accent);

  box-shadow:

    0 0 8px rgba(122,143,216,.35),
    0 0 18px rgba(122,143,216,.28),
    0 0 38px rgba(122,143,216,.22),

    inset 0 0 18px rgba(122,143,216,.08),
    inset 0 0 24px rgba(0,0,0,.55);

  clip-path:polygon(
    0 0,
    100% 0,
    100% 100%,
    70px 100%,
    0 calc(100% - 70px)
  );

}

.console::before{

  content:"";

  position:absolute;

  left:-10px;
  right:-10px;
  top:-18px;

  height:18px;

  background:#000;

  z-index:-1;

}
