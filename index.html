/* =========================================================
   4) 月テクスチャ
   ========================================================= */

function createMoonTexture(phase){

  const size = 256;

  const canvas = document.createElement("canvas");

  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");

  const cx = size/2;
  const cy = size/2;

  const r = size*0.34;

  const g = ctx.createRadialGradient(
    cx,cy,0,
    cx,cy,r*1.6
  );

  g.addColorStop(0,"rgba(255,255,230,0.9)");
  g.addColorStop(0.5,"rgba(255,230,180,0.35)");
  g.addColorStop(1,"rgba(255,230,180,0)");

  ctx.fillStyle=g;
  ctx.fillRect(0,0,size,size);

  ctx.fillStyle="#fffdf3";

  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.fill();

  ctx.globalCompositeOperation="destination-out";

  const offset=(phase-0.5)*r*2.2;

  ctx.beginPath();
  ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2);
  ctx.fill();

  return new THREE.CanvasTexture(canvas);

}

/* =========================================================
   7) 星
   ========================================================= */

function createStars(size,count){

  const geo=new THREE.BufferGeometry();

  const pos=new Float32Array(count*3);

  for(let i=0;i<count;i++){

    pos[i*3]=(Math.random()-0.5)*size;
    pos[i*3+1]=(Math.random()-0.5)*size;
    pos[i*3+2]=(Math.random()-0.5)*size;

  }

  geo.setAttribute(
    "position",
    new THREE.BufferAttribute(pos,3)
  );

  return new THREE.Points(
    geo,
    new THREE.PointsMaterial({
      color:0xffffff,
      size:0.05
    })
  );

}

/* =========================================================
   12) popup位置
   ========================================================= */

function updatePopupForHoveredMoon(moon){

  const worldPos = new THREE.Vector3();
  moon.getWorldPosition(worldPos);

  const v = worldPos.clone().project(camera);

  const screenX = (v.x * 0.5 + 0.5) * window.innerWidth;
  const screenY = (-v.y * 0.5 + 0.5) * window.innerHeight;

  /* =========================================================
     popup を月軌道の外側に出す
     ========================================================= */

  /* 軌道の中心（見た目上の中心） */
  const orbitCenterX = window.innerWidth * 0.5;
  const orbitCenterY = window.innerHeight * 0.5;

  /* 軌道中心 → 月 の方向ベクトル */
  let outwardX = screenX - orbitCenterX;
  let outwardY = screenY - orbitCenterY;

  /* ゼロ割り防止 */
  const outwardLen = Math.sqrt(outwardX * outwardX + outwardY * outwardY) || 0.0001;

  /* 正規化（長さ1にする） */
  outwardX /= outwardLen;
  outwardY /= outwardLen;

  /* 月から popup をどれだけ離すか */
  const popupDistance = 260;

  /* popup の中心位置 */
  let popupX = screenX + outwardX * popupDistance;
  let popupY = screenY + outwardY * popupDistance;

    /* =========================================================
        妖精回避
        ========================================================= */
     
     const fairyWorld = new THREE.Vector3();
     fairy.getWorldPosition(fairyWorld);
     
     const fairyScreen = fairyWorld.clone().project(camera);
     
     const fairyX = (fairyScreen.x * 0.5 + 0.5) * window.innerWidth;
     const fairyY = (-fairyScreen.y * 0.5 + 0.5) * window.innerHeight;
     
     /* 妖精の安全半径 */
     const fairySafeRadius = 260;
     
     /* popup中心と妖精中心の距離 */
     let fx = popupX - fairyX;
     let fy = popupY - fairyY;
     let fairyDist = Math.sqrt(fx * fx + fy * fy) || 0.0001;
     
     /* 妖精に近すぎたら、安全円の外周まで強制移動 */
     if(fairyDist < fairySafeRadius){
       popupX = fairyX + (fx / fairyDist) * fairySafeRadius;
       popupY = fairyY + (fy / fairyDist) * fairySafeRadius;
     }
     
  /* 画面外にはみ出しにくくする */
  const popupMarginX = 260;
  const popupMarginY = 140;

  popupX = Math.max(popupMarginX, Math.min(window.innerWidth - popupMarginX, popupX));
  popupY = Math.max(popupMarginY, Math.min(window.innerHeight - popupMarginY, popupY));

 /* =========================================================
   クランプ後もう一度妖精回避
   ========================================================= */

  fx = popupX - fairyX;
  fy = popupY - fairyY;
  fairyDist = Math.sqrt(fx * fx + fy * fy) || 0.0001;

  if(fairyDist < fairySafeRadius){
    popupX = fairyX + (fx / fairyDist) * fairySafeRadius;
    popupY = fairyY + (fy / fairyDist) * fairySafeRadius;
  }
     
  moonPopup.style.left = popupX + "px";
  moonPopup.style.top = popupY + "px";

  const rect = moonPopup.getBoundingClientRect();


  /* popupの最近接点 */

  const closestX = Math.max(rect.left, Math.min(screenX, rect.right));
  const closestY = Math.max(rect.top, Math.min(screenY, rect.bottom));


  /* 月方向 */

  let dx = closestX - screenX;
  let dy = closestY - screenY;

  const len = Math.sqrt(dx*dx + dy*dy) || 0.0001;

  const dirX = dx / len;
  const dirY = dy / len;


  /* 月半径 */

  const moonRadius = moon.scale.x * 26;


  /* 線始点 */

  const startX = screenX + dirX * moonRadius;
  const startY = screenY + dirY * moonRadius;


  /* popupに重ならない */

  const offset = 10;

  const endX = closestX - dirX * offset;
  const endY = closestY - dirY * offset;


  /* 距離 */

  const dist = Math.sqrt(
    (endX - startX) * (endX - startX) +
    (endY - startY) * (endY - startY)
  );


  /* 角度 */

  const angle = Math.atan2(
    endY - startY,
    endX - startX
  ) * 180 / Math.PI;


  /* 描画 */

  tail.style.opacity = 1;
  tail.style.left = startX + "px";
  tail.style.top = startY + "px";
  tail.style.width = dist + "px";
  tail.style.transform = "rotate(" + angle + "deg)";

  const safeDistance = 120;
  if(dist < safeDistance){
    tail.style.opacity = 0;
    return;
  }

}


/* =========================================================
   13) アニメーション
   ========================================================= */

function animate(){

  requestAnimationFrame(animate);

  orbitScroll+=(orbitTarget-orbitScroll)*0.08;

  camera.position.x+=(mouseX*0.6-camera.position.x)*0.05;

  camera.lookAt(0,0,0);

  raycaster.setFromCamera(mouse,camera);

  const hit=raycaster.intersectObjects(moons);

  hovered=hit.length>0 ? hit[0].object : null;

  if(hovered){

    document.body.style.cursor="pointer";

    moonTitle.textContent=hovered.userData.title;
    moonSubtitle.innerHTML = hovered.userData.subtitle;

    moonPopup.style.opacity=1;
    moonPopup.style.transform="translate(-50%,-50%) scale(1)";

  }else{

    document.body.style.cursor="default";

    moonPopup.style.opacity=0;
    moonPopup.style.transform="translate(-50%,-50%) scale(.95)";

    tail.style.opacity=0;

  }

  for(const moon of moons){

    const a=moon.userData.angle+orbitScroll;

    const x=Math.cos(a)*radiusX;
    const y=Math.sin(a)*radiusY;
    const z=Math.sin(a)*2;

    moon.position.set(x,y,z);

    const depth=(z+2)/4;
    const scale=0.6+depth*0.6;

    if(moon===hovered){
      moon.scale.set(scale*1.2,scale*1.2,1);
    }else{
      moon.scale.set(scale,scale,1);
    }

    moon.material.opacity=0.5+depth*0.5;

    moon.renderOrder=z>0 ? 5 : 15;

  }

  if(hovered){
    updatePopupForHoveredMoon(hovered);
  }

  fairyLight.position.x=mouseX*2;
  fairyLight.position.y=mouseY*-1;

  starsNear.rotation.y+=0.0005;
  starsFar.rotation.y+=0.0002;

  renderer.render(scene,camera);

}

animate();



/* =========================================================
   14) リサイズ
   ========================================================= */

window.addEventListener("resize",()=>{

  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();

  renderer.setSize(window.innerWidth,window.innerHeight);

  renderer.setPixelRatio(
    Math.min(window.devicePixelRatio,2)
  );

});

</script>
