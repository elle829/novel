<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moon Archive</title>

<style>

/* ===============================
画面
=============================== */

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at 50% 78%, rgba(255,210,160,0.35) 0%, rgba(255,190,150,0.18) 18%, rgba(10,14,40,0) 40%),
linear-gradient(to top,#1a1e3f 0%,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817 100%);

font-family:"Hiragino Sans","Yu Gothic",sans-serif;
color:white;
}

#scene{
position:absolute;
inset:0;
}

#moonTitle{
position:absolute;
left:50%;
bottom:80px;
transform:translateX(-50%);
font-size:14px;
letter-spacing:.1em;
opacity:0;
transition:opacity .2s;
}

</style>
</head>

<body>

<div id="scene"></div>
<div id="moonTitle"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"

/* ===============================
基本セット
=============================== */

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
)

camera.position.set(0,0.6,9)
camera.lookAt(0,0,0)

const renderer = new THREE.WebGLRenderer({
antialias:true,
alpha:true
})

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("scene").appendChild(renderer.domElement)

/* ===============================
ライト
=============================== */

const ambient = new THREE.AmbientLight(0xaebcff,0.9)
scene.add(ambient)

const fairyLight = new THREE.PointLight(0xa5f4ff,2,20)
scene.add(fairyLight)

/* ===============================
妖精
=============================== */

const loader = new THREE.TextureLoader()

const fairyTexture = loader.load("./png/yousei2.png")

const fairyMaterial = new THREE.SpriteMaterial({
map:fairyTexture,
transparent:true,
depthWrite:false,
blending:THREE.AdditiveBlending
})

const fairy = new THREE.Sprite(fairyMaterial)

fairy.scale.set(5,6.5,1)
fairy.renderOrder = 10

scene.add(fairy)

/* ===============================
妖精光粒子
=============================== */

const fairyParticles = new THREE.BufferGeometry()

const particleCount = 120

const particlePos = new Float32Array(particleCount*3)

for(let i=0;i<particleCount;i++){

particlePos[i*3]=(Math.random()-0.5)*2
particlePos[i*3+1]=(Math.random()-0.5)*2
particlePos[i*3+2]=(Math.random()-0.5)*2

}

fairyParticles.setAttribute(
"position",
new THREE.BufferAttribute(particlePos,3)
)

const particleMat = new THREE.PointsMaterial({
color:0xa5f4ff,
size:0.05,
transparent:true,
opacity:0.8
})

const particles = new THREE.Points(fairyParticles,particleMat)

scene.add(particles)

/* ===============================
満ち欠け月
=============================== */

function createMoonTexture(phase){

const size=256
const canvas=document.createElement("canvas")

canvas.width=size
canvas.height=size

const ctx=canvas.getContext("2d")

const cx=size/2
const cy=size/2
const r=size*0.34

/* 光グラデーション */

const glow=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.6)

glow.addColorStop(0,"rgba(255,255,230,0.9)")
glow.addColorStop(.5,"rgba(255,240,200,0.3)")
glow.addColorStop(1,"rgba(255,240,200,0)")

ctx.fillStyle=glow
ctx.fillRect(0,0,size,size)

/* 月 */

ctx.fillStyle="#fffdf3"

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.fill()

ctx.globalCompositeOperation="destination-out"

const offset=(phase-0.5)*r*2.2

ctx.beginPath()
ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2)
ctx.fill()

return new THREE.CanvasTexture(canvas)

}

/* ===============================
月データ
=============================== */

const moonData=[

{title:"第一話 夜のはじまり",url:"story01.html"},
{title:"第二話 薄明の庭",url:"story02.html"},
{title:"第三話 眠らない海",url:"story03.html"},
{title:"第四話 玻璃の鳥",url:"story04.html"},
{title:"第五話 風の手紙",url:"story05.html"},
{title:"第六話 残光の塔",url:"story06.html"},
{title:"第七話 白い回廊",url:"story07.html"},
{title:"第八話 祈りの庭園",url:"story08.html"},
{title:"第九話 朝焼けの手前",url:"story09.html"},
{title:"第十話 月が明ける場所",url:"story10.html"}

]

/* ===============================
月生成
=============================== */

const moonGroup=new THREE.Group()

moonGroup.rotation.x=-2.1
moonGroup.rotation.z=0.35

scene.add(moonGroup)

const moons=[]

const radiusX=6
const radiusY=2.5

for(let i=0;i<10;i++){

const texture=createMoonTexture(i/9)

const material=new THREE.SpriteMaterial({
map:texture,
transparent:true
})

const moon=new THREE.Sprite(material)

moon.userData={
angle:i/10*Math.PI*2,
title:moonData[i].title,
url:moonData[i].url
}

moonGroup.add(moon)
moons.push(moon)

}

/* ===============================
星パララックス
=============================== */

function createStars(size){

const geo=new THREE.BufferGeometry()

const count=400

const pos=new Float32Array(count*3)

for(let i=0;i<count;i++){

pos[i*3]=(Math.random()-0.5)*size
pos[i*3+1]=(Math.random()-0.5)*size
pos[i*3+2]=(Math.random()-0.5)*size

}

geo.setAttribute("position",new THREE.BufferAttribute(pos,3))

return new THREE.Points(
geo,
new THREE.PointsMaterial({color:0xffffff,size:0.05})
)

}

const starsNear=createStars(40)
const starsFar=createStars(60)

scene.add(starsNear)
scene.add(starsFar)

/* ===============================
Raycaster
=============================== */

const raycaster=new THREE.Raycaster()
const mouse=new THREE.Vector2()

let hoveredMoon=null

window.addEventListener("pointermove",(e)=>{

mouse.x=(e.clientX/window.innerWidth)*2-1
mouse.y=-(e.clientY/window.innerHeight)*2+1

})

/* ===============================
スクロール
=============================== */

let orbitTarget=0
let orbitScroll=0

window.addEventListener("wheel",(e)=>{
orbitTarget+=e.deltaY*0.0015
})

/* ===============================
クリック
=============================== */

window.addEventListener("click",()=>{

if(hoveredMoon){

window.location.href=hoveredMoon.userData.url

}

})

/* ===============================
アニメーション
=============================== */

const clock=new THREE.Clock()

function animate(){

requestAnimationFrame(animate)

orbitScroll+=(orbitTarget-orbitScroll)*0.08

raycaster.setFromCamera(mouse,camera)

const intersects=raycaster.intersectObjects(moons)

hoveredMoon=null

if(intersects.length>0){

hoveredMoon=intersects[0].object

document.body.style.cursor="pointer"

document.getElementById("moonTitle").innerText=
hoveredMoon.userData.title

document.getElementById("moonTitle").style.opacity=1

}else{

document.body.style.cursor="default"

document.getElementById("moonTitle").style.opacity=0

}

moons.forEach(moon=>{

const a=moon.userData.angle+orbitScroll

const x=Math.cos(a)*radiusX
const y=Math.sin(a)*radiusY
const z=Math.sin(a)*2

moon.position.set(x,y,z)

const depth=(z+2)/4

const scale=0.6+depth*0.6

if(moon===hoveredMoon){

moon.scale.set(scale*1.2,scale*1.2,1)

}else{

moon.scale.set(scale,scale,1)

}

moon.material.opacity=0.5+depth*0.5

moon.renderOrder=z>0?1:20

})

fairyLight.position.x=(mouse.x)*2
fairyLight.position.y=(mouse.y)*-1

starsNear.rotation.y+=0.0005
starsFar.rotation.y+=0.0002

particles.rotation.y=clock.getElapsedTime()*0.4

renderer.render(scene,camera)

}

animate()

/* ===============================
リサイズ
=============================== */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()

renderer.setSize(window.innerWidth,window.innerHeight)

})

</script>

</body>
</html>
