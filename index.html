<html lang="ja">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Moon Archive</title>

<style>

/* ===== カラー ===== */

:root{
--ui-accent:#7a8fd8;
--ui-accent-glow:rgba(122,143,216,.48);
--ui-accent-soft:rgba(122,143,216,.24);
--ui-title:#eef2ff;
--ui-subtitle:#d1d9ff;
--ui-frame-bg-top:rgba(25,25,35,.88);
--ui-frame-bg-bottom:rgba(18,18,25,.95);
}

/* ===== 背景 ===== */

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;

background:
radial-gradient(circle at 50% 78%,rgba(255,210,160,.35),rgba(255,190,150,.18)18%,rgba(10,14,40,0)40%),
linear-gradient(to top,#1a1e3f,#1b2a63 30%,#13214f 55%,#0a1638 80%,#040817);

color:white;

font-family:"fot-tsukuaoldmin-pr6n","Yu Mincho",serif;
font-weight:300;
letter-spacing:.05em;
}

#scene{
position:absolute;
inset:0;
}

/* ===== ヘッダー ===== */

.site-header{
position:fixed;
top:22px;
left:50%;
transform:translateX(-50%);
font-size:28px;
letter-spacing:.12em;
color:#eef2ff;
text-shadow:0 0 8px rgba(210,220,255,.25);
z-index:10;
}

/* ===== ヘルプ ===== */

.help-button{
position:fixed;
right:28px;
bottom:28px;
width:44px;
height:44px;
border-radius:50%;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.15);
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
cursor:pointer;
z-index:20;
}

.help-popup{
position:fixed;
right:28px;
bottom:90px;
width:220px;
padding:14px;
background:rgba(15,18,40,.95);
border:1px solid rgba(255,255,255,.15);
border-radius:12px;
font-size:13px;
line-height:1.6;
opacity:0;
pointer-events:none;
transition:opacity .2s;
z-index:20;
}

.help-button:hover+.help-popup{
opacity:1;
}

/* ===== popup ===== */

#moonPopup{
position:absolute;
pointer-events:none;
opacity:0;
transform:translate(-50%,-50%) scale(.95);
transition:opacity .22s,transform .22s;
z-index:20;
}

.popup-tail{
position:fixed;
width:0;
height:2px;
background:var(--ui-accent);
transform-origin:0 50%;
pointer-events:none;
z-index:25;
opacity:0;
}

.console{
position:relative;
width:420px;
padding:50px 40px 48px;
background:linear-gradient(var(--ui-frame-bg-top),var(--ui-frame-bg-bottom));
border:2px solid var(--ui-accent);
clip-path:polygon(0 0,100% 0,100% 100%,70px 100%,0 calc(100% - 70px));
}

.popup-title{
font-size:24px;
margin-bottom:16px;
color:var(--ui-title);
}

.popup-subtitle{
font-size:14px;
color:var(--ui-subtitle);
}

/* ===== モバイル ===== */

@media(max-width:768px){

.console{
width:min(84vw,360px);
padding:30px;
}

.popup-title{font-size:18px}
.popup-subtitle{font-size:12px}

}

</style>
</head>

<body>

<div id="scene"></div>

<header class="site-header">
君について知っている10のこと
</header>

<div class="help-button">?</div>

<div class="help-popup">
操作<br><br>
・スクロール：月公転<br>
・月ホバー：タイトル表示<br>
・クリック：ページ移動
</div>

<div class="popup-tail"></div>

<div id="moonPopup">
<div class="console">
<div class="popup-title" id="moonTitle"></div>
<div class="popup-subtitle" id="moonSubtitle"></div>
</div>
</div>

<div class="bottom">
ABOUT YOU / MIRRORING LAB.
</div>

<div class="page-flip" id="pageFlip"></div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js";

/* ===== 基本 ===== */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
55,
window.innerWidth/window.innerHeight,
0.1,
100
);

camera.position.set(0,0.6,9);

const renderer=new THREE.WebGLRenderer({
antialias:true,
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

document.getElementById("scene").appendChild(renderer.domElement);

/* ===== ライト ===== */

scene.add(new THREE.AmbientLight(0xaebcff,0.9));

const fairyLight=new THREE.PointLight(0xa5f4ff,2,20);
scene.add(fairyLight);

/* ===== 妖精 ===== */

const loader=new THREE.TextureLoader();

const fairyTexture=loader.load("./png/yousei3.png");

const fairy=new THREE.Sprite(
new THREE.SpriteMaterial({
map:fairyTexture,
transparent:true,
depthWrite:false
})
);

fairy.scale.set(4.2,5.4,1);
fairy.renderOrder=10;

scene.add(fairy);

/* ===== 月 ===== */

function createMoonTexture(phase){

const size=256;

const canvas=document.createElement("canvas");
canvas.width=size;
canvas.height=size;

const ctx=canvas.getContext("2d");

const cx=size/2;
const cy=size/2;
const r=size*0.34;

const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.6);

g.addColorStop(0,"rgba(255,255,230,0.9)");
g.addColorStop(0.5,"rgba(255,230,180,0.35)");
g.addColorStop(1,"rgba(255,230,180,0)");

ctx.fillStyle=g;
ctx.fillRect(0,0,size,size);

ctx.fillStyle="#fffdf3";

ctx.beginPath();
ctx.arc(cx,cy,r,0,Math.PI*2);
ctx.fill();

ctx.globalCompositeOperation="destination-out";

const offset=(phase-0.5)*r*2.2;

ctx.beginPath();
ctx.arc(cx+offset,cy,r*0.98,0,Math.PI*2);
ctx.fill();

return new THREE.CanvasTexture(canvas);

}

const moonData=[
{title:"酒場にて",subtitle:"フラッグシップ / デミアン",url:"story01.html"},
{title:"舌戦",subtitle:"秘聞の館 / ネフェル、ヤフォダ",url:"story02.html"},
{title:"甘いもの",subtitle:"工房",url:"story03.html"},
{title:"宴",subtitle:"西風騎士団",url:"story04.html"},
{title:"信仰",subtitle:"霜月の子",url:"story05.html"},
{title:"似たもの",subtitle:"実験設計局",url:"story06.html"},
{title:"家",subtitle:"銀月の庭",url:"story07.html"},
{title:"空想",subtitle:"魔女会",url:"story08.html"},
{title:"使命",subtitle:"ライトキーパー",url:"story09.html"},
{title:"報告結果",subtitle:"君へ",url:"story10.html"}
];

const moonGroup=new THREE.Group();

moonGroup.rotation.x=-2.1;
moonGroup.rotation.z=0.35;

scene.add(moonGroup);

const moons=[];

const radiusX=4.5;
const radiusY=1.9;

for(let i=0;i<10;i++){

const moon=new THREE.Sprite(
new THREE.SpriteMaterial({
map:createMoonTexture(i/9),
transparent:true,
depthWrite:false
})
);

moon.userData={
angle:i/10*Math.PI*2,
...moonData[i]
};

moonGroup.add(moon);
moons.push(moon);

}

/* ===== 星 ===== */

function createStars(size,count){

const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);

for(let i=0;i<count;i++){

pos[i*3]=(Math.random()-0.5)*size;
pos[i*3+1]=(Math.random()-0.5)*size;
pos[i*3+2]=(Math.random()-0.5)*size;

}

geo.setAttribute(
"position",
new THREE.BufferAttribute(pos,3)
);

return new THREE.Points(
geo,
new THREE.PointsMaterial({
color:0xffffff,
size:0.05
})
);

}

const starsNear=createStars(40,400);
const starsFar=createStars(60,400);

scene.add(starsNear);
scene.add(starsFar);

/* ===== マウス ===== */

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

let hovered=null;
let mouseX=0;
let mouseY=0;

window.addEventListener("pointermove",e=>{

mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;

mouseX=mouse.x;
mouseY=mouse.y;

});

/* ===== popup ===== */

const moonPopup=document.getElementById("moonPopup");
const moonTitle=document.getElementById("moonTitle");
const moonSubtitle=document.getElementById("moonSubtitle");
const tail=document.querySelector(".popup-tail");

/* ===== 公転 ===== */

let orbitTarget=0;
let orbitScroll=0;

window.addEventListener("wheel",e=>{
orbitTarget+=e.deltaY*0.0015;
});

/* ===== popup位置 ===== */

function updatePopupForHoveredMoon(moon){

const worldPos=new THREE.Vector3();
moon.getWorldPosition(worldPos);

const v=worldPos.clone().project(camera);

const screenX=(v.x*0.5+0.5)*window.innerWidth;
const screenY=(-v.y*0.5+0.5)*window.innerHeight;

/* 外向き */

let outwardX=screenX-window.innerWidth*0.5;
let outwardY=screenY-window.innerHeight*0.5;

const outwardLen=Math.hypot(outwardX,outwardY)||0.0001;

outwardX/=outwardLen;
outwardY/=outwardLen;

const popupDistance=260;

let popupX=screenX+outwardX*popupDistance;
let popupY=screenY+outwardY*popupDistance;

/* 妖精回避 */

const fairyWorld=new THREE.Vector3();
fairy.getWorldPosition(fairyWorld);

const fairyScreen=fairyWorld.clone().project(camera);

const fairyX=(fairyScreen.x*0.5+0.5)*window.innerWidth;
const fairyY=(-fairyScreen.y*0.5+0.5)*window.innerHeight;

const fairySafeRadius=260;

let fx=popupX-fairyX;
let fy=popupY-fairyY;

let fairyDist=Math.hypot(fx,fy)||0.0001;

if(fairyDist<fairySafeRadius){

popupX=fairyX+(fx/fairyDist)*fairySafeRadius;
popupY=fairyY+(fy/fairyDist)*fairySafeRadius;

}

moonPopup.style.left=popupX+"px";
moonPopup.style.top=popupY+"px";

}

/* ===== アニメーション ===== */

function animate(){

requestAnimationFrame(animate);

orbitScroll+=(orbitTarget-orbitScroll)*0.08;

camera.position.x+=(mouseX*0.6-camera.position.x)*0.05;
camera.lookAt(0,0,0);

raycaster.setFromCamera(mouse,camera);

const hit=raycaster.intersectObjects(moons);

hovered=hit.length>0?hit[0].object:null;

if(hovered){

moonTitle.textContent=hovered.userData.title;
moonSubtitle.textContent=hovered.userData.subtitle;

moonPopup.style.opacity=1;
moonPopup.style.transform="translate(-50%,-50%) scale(1)";

updatePopupForHoveredMoon(hovered);

}else{

moonPopup.style.opacity=0;
tail.style.opacity=0;

}

for(const moon of moons){

const a=moon.userData.angle+orbitScroll;

const x=Math.cos(a)*radiusX;
const y=Math.sin(a)*radiusY;
const z=Math.sin(a)*2;

moon.position.set(x,y,z);

const depth=(z+2)/4;
const scale=0.6+depth*0.6;

moon.scale.set(scale,scale,1);
moon.material.opacity=0.5+depth*0.5;

}

starsNear.rotation.y+=0.0005;
starsFar.rotation.y+=0.0002;

renderer.render(scene,camera);

}

animate();

/* ===== リサイズ ===== */

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

renderer.setPixelRatio(
Math.min(window.devicePixelRatio,2)
);

});

</script>

</body>
</html>
